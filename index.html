<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JST Smart Vehicle Disc Reader</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.90)),
url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");

background-size:cover;
background-position:center;
min-height:100vh;
color:white;
padding:20px;
}

.container{
max-width:950px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.12);
padding:20px;
border-radius:18px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.12);
}

h1{
margin-bottom:20px;
font-size:30px;
}

.videoWrap{
position:relative;
}

video{
width:100%;
border-radius:15px;
background:black;
}

.scanBox{
position:absolute;
top:12%;
left:10%;
width:80%;
height:72%;
border:3px solid #00ff88;
border-radius:15px;
box-shadow:0 0 25px #00ff88;
pointer-events:none;
}

.scanLine{
position:absolute;
top:15%;
left:10%;
width:80%;
height:3px;
background:#00ff88;
box-shadow:0 0 15px #00ff88;
animation:scanMove 2s linear infinite;
}

@keyframes scanMove{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(260px);
}

100%{
transform:translateY(0px);
}

}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#003049;
color:white;
font-size:16px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

button:hover{
background:#004d73;
}

.result{
margin-top:20px;
background:rgba(0,0,0,0.45);
padding:18px;
border-radius:14px;
line-height:2;
font-size:17px;
}

.result span{
color:#00ff88;
font-weight:bold;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff4d4d;
font-weight:bold;
}

#canvas{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>
🚗 JST Smart Disc Recognition System
</h1>

<div class="videoWrap">

<video
id="video"
autoplay
playsinline
muted>
</video>

<div class="scanBox"></div>

<div class="scanLine"></div>

</div>

<button onclick="captureDisc()">
SCAN VEHICLE DISC
</button>

<p
id="status"
style="margin-top:15px;">
Starting camera...
</p>

<div
class="result"
id="output">

Licence Number :
<span>-</span><br>

VIN :
<span>-</span><br>

Engine Number :
<span>-</span><br>

Vehicle Make :
<span>-</span><br>

Expiry Date :
<span>-</span>

</div>

</div>

</div>

<canvas id="canvas"></canvas>

<script>

/* =========================
ELEMENTS
========================= */

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const statusText =
document.getElementById("status");

const output =
document.getElementById("output");

/* =========================
START CAMERA
========================= */

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
},
width:{ideal:1920},
height:{ideal:1080}
},

audio:false

});

video.srcObject = stream;

await video.play();

statusText.innerHTML =
"<span class='success'>Camera Ready ✔</span>";

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>Camera Failed ❌</span>";

}

}

startCamera();

/* =========================
IMAGE ENHANCEMENT
========================= */

function enhanceImage(ctx,width,height){

const imageData =
ctx.getImageData(0,0,width,height);

const data =
imageData.data;

/* SHARPEN + CONTRAST */

for(let i=0;i<data.length;i+=4){

let r = data[i];
let g = data[i+1];
let b = data[i+2];

let avg = (r+g+b)/3;

/* increase contrast */

avg = avg > 120 ? 255 : 0;

data[i] = avg;
data[i+1] = avg;
data[i+2] = avg;

}

ctx.putImageData(imageData,0,0);

}

/* =========================
EXTRACT DISC DATA
========================= */

function extractData(text){

text = text
.toUpperCase()
.replace(/\n/g," ")
.replace(/\s+/g," ")
.trim();

console.log(text);

let licenceNo = "";
let vin = "";
let engineNo = "";
let make = "";
let expiryDate = "";

/* LICENCE NUMBER */

const licencePatterns = [

/LISENSIENR\.?\s*([A-Z0-9]+)/,
/LICENCE\s*NO\.?\s*([A-Z0-9]+)/,
/LICENCE\s*NR\.?\s*([A-Z0-9]+)/

];

for(let p of licencePatterns){

const m = text.match(p);

if(m){

licenceNo = m[1];
break;

}

}

/* VIN */

const vinMatch =
text.match(/VIN\s*([A-HJ-NPR-Z0-9]{10,20})/);

if(vinMatch){

vin = vinMatch[1];

}

/* ENGINE */

const enginePatterns = [

/ENGINE\s*NO\.?\s*([A-Z0-9]+)/,
/ENJINNR\.?\s*([A-Z0-9]+)/

];

for(let p of enginePatterns){

const m = text.match(p);

if(m){

engineNo = m[1];
break;

}

}

/* MAKE */

const brands = [

"TOYOTA",
"VOLKSWAGEN",
"VW",
"BMW",
"MERCEDES",
"FORD",
"NISSAN",
"HYUNDAI",
"KIA",
"AUDI",
"ISUZU",
"HONDA",
"CHEVROLET",
"MITSUBISHI",
"LEXUS",
"VOLVO",
"SUZUKI",
"RENAULT",
"MAZDA",
"HAVAL",
"MAHINDRA"

];

for(let b of brands){

if(text.includes(b)){

make = b;
break;

}

}

/* EXPIRY DATE */

const expiryMatch =
text.match(/\b20\d{2}-\d{2}-\d{2}\b/);

if(expiryMatch){

expiryDate = expiryMatch[0];

}

return{

licenceNo,
vin,
engineNo,
make,
expiryDate

};

}

/* =========================
SCAN DISC
========================= */

window.captureDisc = async function(){

try{

statusText.innerHTML =
"Capturing disc...";

/* TAKE PHOTO */

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

/* IMPROVE IMAGE */

enhanceImage(
ctx,
canvas.width,
canvas.height
);

/* OCR */

const result =
await Tesseract.recognize(

canvas.toDataURL("image/jpeg",1),

"eng",

{
logger:m=>{

if(m.status==="recognizing text"){

statusText.innerHTML =
"Processing "
+
Math.round(m.progress*100)
+
"%";

}

}
}

);

const text =
result.data.text || "";

/* EXTRACT */

const data =
extractData(text);

/* SHOW */

output.innerHTML = `

Licence Number :
<span>${data.licenceNo || "-"}</span><br>

VIN :
<span>${data.vin || "-"}</span><br>

Engine Number :
<span>${data.engineNo || "-"}</span><br>

Vehicle Make :
<span>${data.make || "-"}</span><br>

Expiry Date :
<span>${data.expiryDate || "-"}</span>

`;

statusText.innerHTML =
"<span class='success'>Disc Read Successfully ✔</span>";

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>Scan Failed ❌</span>";

}

};

</script>

</body>
</html>
