<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JST AI ANPR SCANNER</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
color:white;
}

.container{padding:15px;max-width:900px;margin:auto;}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:14px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

.videoWrap{
position:relative;
}

video{
width:100%;
border-radius:12px;

/* 🔥 REAL SCAN FILTER (KEY UPGRADE) */
filter: grayscale(1) contrast(2.2) brightness(1.2);
}

.overlay{
position:absolute;
top:0;left:0;
width:100%;
height:100%;
border:2px solid #00ff88;
border-radius:12px;
animation:pulse 1.2s infinite;
pointer-events:none;
}

@keyframes pulse{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

.step{color:#00d9ff;font-weight:bold;}
.success{color:#00ff88}
.error{color:#ff4d4d}
pre{white-space:pre-wrap;font-size:13px;}

</style>
</head>

<body>

<div class="container">

<h2>🚗 JST AI DARK SCAN ANPR SYSTEM</h2>

<div class="card">

<p class="step" id="stepText">STEP 1: Scan Vehicle Disc</p>

<div class="videoWrap">
<video id="video" autoplay playsinline muted></video>
<div class="overlay"></div>
</div>

<button onclick="scan()">SCAN (AI MODE)</button>

<p id="status">Starting camera...</p>

<pre id="output"></pre>

</div>

<div class="card">
<h3>🔐 Security Panel</h3>
<input id="code" placeholder="Enter Access Code">
<button onclick="verify()">VERIFY</button>
<p id="verifyOut"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

let step = 1;
let vehicleData = null;

/* CAMERA */
async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:false
});
video.srcObject = stream;
await video.play();
document.getElementById("status").innerText = "AI DARK SCAN READY ✔";
}
startCamera();

/* CLEAN TEXT */
function clean(t){
return t.toUpperCase()
.replace(/[^A-Z0-9\s]/g," ")
.replace(/\s+/g," ")
.trim();
}

/* PLATE ONLY */
function getPlate(t){
return clean(t).match(/\b[A-Z]{2,3}\s?\d{3,6}\b/)?.[0] || "";
}

/* MAKE ONLY */
function getMake(t){
const brands=[
"TOYOTA","BMW","MERCEDES","FORD","VW","VOLKSWAGEN",
"NISSAN","HYUNDAI","KIA","AUDI","ISUZU","HONDA",
"CHEVROLET","MITSUBISHI","LEXUS","JEEP","VOLVO"
];

t = clean(t);
for(let b of brands){
if(t.includes(b)) return b;
}
return "";
}

/* ID ONLY */
function getID(t){
return clean(t).match(/\b\d{13}\b/)?.[0] || "";
}

/* FAST OCR SETTINGS */
async function ocr(img){
return await Tesseract.recognize(img,"eng",{
tessedit_pageseg_mode:7,
logger:()=>{}
});
}

/* SCAN */
window.scan = async function(){

document.getElementById("status").innerText = "AI SCANNING...";

const canvas=document.createElement("canvas");

/* CENTER FOCUS ZONE */
canvas.width = video.videoWidth*0.75;
canvas.height = video.videoHeight*0.45;

const ctx = canvas.getContext("2d");

ctx.drawImage(
video,
video.videoWidth*0.12,
video.videoHeight*0.3,
canvas.width,
canvas.height,
0,0,
canvas.width,
canvas.height
);

const img = canvas.toDataURL("image/jpeg",0.9);

const res = await ocr(img);
const text = res.data.text;

/* STEP 1 */
if(step===1){

const plate = getPlate(text);
const make = getMake(text);

if(!plate && !make){
document.getElementById("status").innerHTML =
"<span class='error'>No disc detected</span>";
return;
}

vehicleData = {plate,make};

document.getElementById("output").innerText =
JSON.stringify(vehicleData,null,2);

document.getElementById("status").innerHTML =
"<span class='success'>DISC CAPTURED ✔</span>";

document.getElementById("stepText").innerText =
"STEP 2: Scan ID ONLY";

step=2;
return;
}

/* STEP 2 */
const id = getID(text);

if(!id){
document.getElementById("status").innerHTML =
"<span class='error'>Invalid ID scan</span>";
return;
}

await addDoc(collection(db,"vehicleAccessLogs"),{
vehicle:vehicleData,
owner:{id},
time:Date.now()
});

document.getElementById("output").innerText =
JSON.stringify({vehicleData,id},null,2);

document.getElementById("status").innerHTML =
"<span class='success'>SAVED ✔</span>";

step=1;
vehicleData=null;

document.getElementById("stepText").innerText =
"STEP 1: Scan Vehicle Disc";
};

/* SECURITY */
window.verify = async function(){

const code=document.getElementById("code").value;

const q=query(collection(db,"visitorCodes"),where("code","==",code));
const snap=await getDocs(q);

if(snap.empty){
document.getElementById("verifyOut").innerHTML=
"<span class='error'>INVALID</span>";
return;
}

const d=snap.docs[0].data();

document.getElementById("verifyOut").innerHTML=
Date.now()>d.expiry
? "<span class='error'>EXPIRED</span>"
: "<span class='success'>ACCESS GRANTED ✔</span>";
};

</script>

</body>
</html>
