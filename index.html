<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JST Disc OCR Reader</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:#0b1117;
color:white;
padding:20px;
}

.container{
max-width:850px;
margin:auto;
}

.card{
background:#111927;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

h1{
margin-bottom:20px;
}

video{
width:100%;
border-radius:12px;
background:black;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#009e7f;
}

.result{
margin-top:20px;
background:#0f141c;
padding:15px;
border-radius:12px;
line-height:2;
}

.result span{
color:#00ff88;
font-weight:bold;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff4d4d;
font-weight:bold;
}

.scanBox{
position:absolute;
top:12%;
left:8%;
width:84%;
height:72%;
border:3px solid #00ff88;
border-radius:12px;
box-shadow:0 0 20px #00ff88;
pointer-events:none;
}

.videoWrap{
position:relative;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>
🚗 JST Smart Disc OCR Reader
</h1>

<div class="videoWrap">

<video
id="video"
autoplay
playsinline
muted>
</video>

<div class="scanBox"></div>

</div>

<button onclick="captureDisc()">
TAKE DISC PHOTO
</button>

<p
id="status"
style="margin-top:15px;">
Starting Camera...
</p>

<div
class="result"
id="output">

Plate :
<span>-</span><br>

Licence Number :
<span>-</span><br>

Vehicle Make :
<span>-</span><br>

VIN :
<span>-</span><br>

Engine Number :
<span>-</span><br>

Expiry Date :
<span>-</span>

</div>

</div>

</div>

<script>

/* CAMERA */

const video =
document.getElementById("video");

const statusText =
document.getElementById("status");

const output =
document.getElementById("output");

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
},
width:{ideal:1920},
height:{ideal:1080}
},

audio:false

});

video.srcObject = stream;

await video.play();

statusText.innerHTML =
"<span class='success'>Camera Ready ✔</span>";

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>Camera Failed ❌</span>";

}

}

startCamera();

/* OCR READER */

window.captureDisc = async function(){

try{

statusText.innerHTML =
"Reading Disc...";

/* TAKE PHOTO */

const canvas =
document.createElement("canvas");

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

/* OCR */

const result =
await Tesseract.recognize(

canvas.toDataURL("image/jpeg",1),

"eng",

{
logger:m=>{

if(m.status==="recognizing text"){

statusText.innerHTML =
"Scanning "
+
Math.round(m.progress*100)
+
"%";

}

}
}

);

/* CLEAN TEXT */

let text =
(result.data.text || "")
.toUpperCase()
.replace(/\n/g," ")
.replace(/\s+/g," ")
.trim();

console.log(text);

/* =====================
EXTRACT DATA
===================== */

let plate = "";
let licence = "";
let make = "";
let vin = "";
let engine = "";
let expiry = "";

/* PLATE */

const platePatterns = [

/\b[A-Z]{2,3}\d{2,6}[A-Z]{0,2}\b/g,
/\b[A-Z]{2}\s\d{3}\s[A-Z]{2}\b/g,
/\b[A-Z]{3}\s\d{3}\b/g

];

for(const pattern of platePatterns){

const match =
text.match(pattern);

if(match){

plate =
match[0]
.replace(/\s/g,"");

break;

}

}

/* LICENCE NUMBER */

const licenceMatch =
text.match(/\b\d{6,12}\b/);

if(licenceMatch){

licence =
licenceMatch[0];

}

/* VIN */

const vinMatch =
text.match(/\b[A-HJ-NPR-Z0-9]{17}\b/);

if(vinMatch){

vin =
vinMatch[0];

}

/* ENGINE */

const engineMatch =
text.match(/\b[A-Z0-9]{6,15}\b/);

if(engineMatch){

engine =
engineMatch[0];

}

/* EXPIRY DATE */

const expiryMatch =
text.match(/\b\d{2}\/\d{2}\/\d{4}\b/);

if(expiryMatch){

expiry =
expiryMatch[0];

}

/* VEHICLE MAKE */

const brands = [

"TOYOTA",
"VOLKSWAGEN",
"VW",
"BMW",
"MERCEDES",
"FORD",
"NISSAN",
"HYUNDAI",
"KIA",
"AUDI",
"ISUZU",
"HONDA",
"CHEVROLET",
"MITSUBISHI",
"LEXUS",
"VOLVO",
"SUZUKI",
"RENAULT",
"MAZDA",
"HAVAL",
"MAHINDRA"

];

for(let b of brands){

if(text.includes(b)){

make = b;
break;

}

}

/* SHOW RESULTS */

output.innerHTML = `

Plate :
<span>${plate || "-"}</span><br>

Licence Number :
<span>${licence || "-"}</span><br>

Vehicle Make :
<span>${make || "-"}</span><br>

VIN :
<span>${vin || "-"}</span><br>

Engine Number :
<span>${engine || "-"}</span><br>

Expiry Date :
<span>${expiry || "-"}</span>

`;

statusText.innerHTML =
"<span class='success'>Disc Read Successfully ✔</span>";

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>Scan Failed ❌</span>";

}

};

</script>

</body>
</html>
