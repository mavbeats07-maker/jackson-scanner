<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JST Vehicle Disc Reader</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");

background-size:cover;
background-position:center;
min-height:100vh;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.12);
padding:20px;
border-radius:16px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.15);
margin-bottom:20px;
}

h1{
margin-bottom:20px;
}

.videoWrap{
position:relative;
}

video{
width:100%;
border-radius:14px;
background:black;
}

.scanBox{
position:absolute;
top:12%;
left:8%;
width:84%;
height:70%;
border:3px solid #00ff88;
border-radius:12px;
box-shadow:0 0 20px #00ff88;
pointer-events:none;
}

.scanLine{
position:absolute;
top:15%;
left:8%;
width:84%;
height:3px;
background:#00ff88;
box-shadow:0 0 15px #00ff88;
animation:scanMove 2s linear infinite;
}

@keyframes scanMove{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(260px);
}

100%{
transform:translateY(0px);
}

}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#003049;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#004d73;
}

.result{
margin-top:20px;
background:rgba(0,0,0,0.45);
padding:15px;
border-radius:12px;
line-height:2;
font-size:16px;
}

.result span{
color:#00ff88;
font-weight:bold;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff4d4d;
font-weight:bold;
}

#canvas{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>
🚗 JST Vehicle Disc Reader
</h1>

<div class="videoWrap">

<video
id="video"
autoplay
playsinline
muted>
</video>

<div class="scanBox"></div>

<div class="scanLine"></div>

</div>

<button onclick="captureDisc()">
SCAN VEHICLE DISC
</button>

<p
id="status"
style="margin-top:15px;">
Starting camera...
</p>

<div
class="result"
id="output">

Plate :
<span>-</span><br>

Licence Number :
<span>-</span><br>

Vehicle Make :
<span>-</span><br>

VIN :
<span>-</span><br>

Engine Number :
<span>-</span><br>

Expiry Date :
<span>-</span>

</div>

</div>

</div>

<canvas id="canvas"></canvas>

<script>

/* =========================
CAMERA
========================= */

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const statusText =
document.getElementById("status");

const output =
document.getElementById("output");

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
},
width:{ideal:1920},
height:{ideal:1080}
},

audio:false

});

video.srcObject = stream;

await video.play();

statusText.innerHTML =
"<span class='success'>Camera Ready ✔</span>";

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>Camera Failed ❌</span>";

}

}

startCamera();

/* =========================
OCR SCAN
========================= */

window.captureDisc = async function(){

try{

statusText.innerHTML =
"Reading vehicle disc...";

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

/* OCR */

const result =
await Tesseract.recognize(

canvas.toDataURL("image/jpeg",1),

"eng",

{
logger:m=>{

if(m.status==="recognizing text"){

statusText.innerHTML =
"Scanning... "
+
Math.round(m.progress*100)
+
"%";

}

}
}

);

let text =
result.data.text || "";

console.log(text);

text = text
.toUpperCase()
.replace(/\n/g," ")
.replace(/\s+/g," ")
.trim();

/* =========================
EXTRACT DATA
========================= */

let plate = "";
let licence = "";
let vin = "";
let engine = "";
let expiry = "";
let make = "";

/* NUMBER PLATE */

const platePatterns = [

/\b[A-Z]{2,3}\d{2,6}[A-Z]{0,2}\b/g,
/\b[A-Z]{1,3}\s?\d{2,6}\s?[A-Z]{0,3}\b/g,
/\b\d{2,6}[A-Z]{2,3}\b/g

];

for(const pattern of platePatterns){

const match =
text.match(pattern);

if(match){

plate =
match[0]
.replace(/\s/g,"")
.trim();

break;

}

}

/* LICENCE NUMBER */

const licenceMatch =
text.match(/\b\d{6,12}\b/);

if(licenceMatch){

licence =
licenceMatch[0];

}

/* VIN */

const vinMatch =
text.match(/\b[A-HJ-NPR-Z0-9]{17}\b/);

if(vinMatch){

vin =
vinMatch[0];

}

/* ENGINE NUMBER */

const engineMatch =
text.match(/\b[A-Z0-9]{6,15}\b/);

if(engineMatch){

engine =
engineMatch[0];

}

/* EXPIRY DATE */

const expiryMatch =
text.match(/\b\d{2}\/\d{2}\/\d{4}\b/);

if(expiryMatch){

expiry =
expiryMatch[0];

}

/* VEHICLE MAKE */

const brands = [

"TOYOTA",
"VOLKSWAGEN",
"VW",
"BMW",
"MERCEDES",
"FORD",
"NISSAN",
"HYUNDAI",
"KIA",
"AUDI",
"ISUZU",
"HONDA",
"CHEVROLET",
"MITSUBISHI",
"LEXUS",
"VOLVO",
"SUZUKI",
"RENAULT",
"MAZDA",
"HAVAL",
"MAHINDRA"

];

for(let b of brands){

if(text.includes(b)){

make = b;
break;

}

}

/* =========================
SHOW RESULTS
========================= */

output.innerHTML = `

Plate :
<span>${plate || "-"}</span><br>

Licence Number :
<span>${licence || "-"}</span><br>

Vehicle Make :
<span>${make || "-"}</span><br>

VIN :
<span>${vin || "-"}</span><br>

Engine Number :
<span>${engine || "-"}</span><br>

Expiry Date :
<span>${expiry || "-"}</span>

`;

statusText.innerHTML =
"<span class='success'>Disc Scan Complete ✔</span>";

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>Scan Failed ❌</span>";

}

};

</script>

</body>
</html>
