<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JST Estate Security Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:
linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1950&q=80");
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
color:white;
}

header{
background:rgba(0,0,0,0.55);
padding:20px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
font-size:30px;
letter-spacing:2px;
}

header p{
margin-top:5px;
opacity:0.9;
}

.container{
padding:15px;
max-width:750px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.12);
padding:15px;
border-radius:16px;
margin-bottom:15px;
}

video{
width:100%;
border-radius:14px;
background:black;
margin-top:10px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#06304d;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:15px;
}

.step{
margin-top:10px;
font-weight:bold;
color:#00d9ff;
}

.status{
margin-top:10px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.08);
font-size:14px;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff5e5e;
font-weight:bold;
}

pre{
white-space:pre-wrap;
font-size:13px;
margin-top:10px;
color:white;
}

footer{
margin-top:20px;
text-align:center;
padding:15px;
background:rgba(0,0,0,0.75);
font-size:12px;
}

</style>
</head>

<body>

<header>

<h1>🚗 JST ESTATE SECURITY</h1>

<p>Rua Vista Ext 36 • Smart Vehicle Verification</p>

</header>

<div class="container">

<!-- SCANNER -->
<div class="card">

<h2>📷 Vehicle + ID Scanner</h2>

<p class="step" id="scanStep">
STEP 1: Scan Vehicle Disc
</p>

<video
id="video"
autoplay
playsinline
muted>
</video>

<button onclick="scanDocument()">
SCAN DOCUMENT
</button>

<div class="status">

<p id="scanStatus">
Starting Camera...
</p>

</div>

<pre id="scanOutput"></pre>

</div>

<!-- SECURITY PANEL -->
<div class="card">

<h2>🛡 Security Verification</h2>

<input
type="text"
id="verifyCode"
placeholder="Enter Resident Access Code"
>

<button onclick="verifyVisitorCode()">
VERIFY ACCESS CODE
</button>

<div id="verifyResult"></div>

</div>

</div>

<footer>

THIS SYSTEM REMAINS PROPERTY OF JACKSON SMART TECHNOLOGIES (PTY) LTD |
REG 2026/320361/07

</footer>

<script type="module">

/* =========================
   FIREBASE
========================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",

authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",

projectId: "jackson-smart-technologi-1db26",

storageBucket: "jackson-smart-technologi-1db26.firebasestorage.app",

messagingSenderId: "400637493049",

appId: "1:400637493049:web:8d349168400988493672e8"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   CAMERA
========================= */

const video = document.getElementById("video");

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment"
},

audio:false

});

video.srcObject = stream;

await video.play();

document.getElementById("scanStatus").innerText =
"Camera Ready ✔";

}catch(err){

document.getElementById("scanStatus").innerHTML =
"<span class='error'>Camera Access Denied ❌</span>";

}

}

startCamera();

/* =========================
   GLOBAL SCAN STATE
========================= */

let currentVehicle = null;
let currentStep = 1;

/* =========================
   OCR CLEANER
========================= */

function cleanOCR(text){

return text
.replace(/\n/g," ")
.replace(/[^A-Z0-9\s]/gi," ")
.replace(/\s+/g," ")
.trim();

}

/* =========================
   VEHICLE DISC PARSER
========================= */

function parseVehicle(rawText){

const text = cleanOCR(rawText.toUpperCase());

/* VIN */
let vin = "";

const vinMatch =
text.match(/\b[A-HJ-NPR-Z0-9]{17}\b/);

if(vinMatch){

vin = vinMatch[0];

}

/* SA NUMBER PLATE */

const provinceCodes =
"(GP|MP|EC|FS|NW|NC|WC|LP|ZN|KZN)";

const platePatterns = [

new RegExp(`\\b[A-Z]{2,3}[0-9]{3,6}${provinceCodes}\\b`),

new RegExp(`\\b[A-Z]{2,3}\\s?[0-9]{3,6}\\s?${provinceCodes}\\b`),

new RegExp(`\\b[A-Z]{1,3}\\s?[0-9]{1,4}\\s?[A-Z]{1,3}\\s?${provinceCodes}\\b`)

];

let plate = "";

for(let pattern of platePatterns){

let found = text.match(pattern);

if(found){

plate = found[0]
.replace(/\s+/g," ")
.trim();

break;

}

}

/* VEHICLE MAKE */

const brands = [

"TOYOTA",
"MAZDA",
"BMW",
"MERCEDES",
"FORD",
"VOLKSWAGEN",
"VW",
"NISSAN",
"HYUNDAI",
"KIA",
"AUDI",
"ISUZU",
"SUZUKI",
"RENAULT",
"HAVAL",
"CHERY",
"MAHINDRA",
"JEEP",
"PEUGEOT",
"CHEVROLET",
"HONDA",
"MITSUBISHI",
"LEXUS",
"LAND ROVER",
"RANGE ROVER",
"MINI",
"FIAT",
"OPEL",
"VOLVO",
"PORSCHE",
"JAGUAR"

];

let make = "";

for(let brand of brands){

if(text.includes(brand)){

make = brand;
break;

}

}

return {

vin,
plate,
make

};

}

/* =========================
   OWNER ID PARSER
========================= */

function parseOwner(rawText){

const text = cleanOCR(rawText);

/* ID NUMBER */

let idNumber = "";

const idMatch =
text.match(/\b\d{13}\b/);

if(idMatch){

idNumber = idMatch[0];

}

/* OWNER NAME */

let owner = "";

const nameMatch =
text.match(/\b[A-Z][a-z]{2,}\s[A-Z][a-z]{2,}\b/);

if(nameMatch){

owner = nameMatch[0];

}

return {

idNumber,
owner

};

}

/* =========================
   MAIN SCANNER
========================= */

window.scanDocument = async function(){

if(!video.videoWidth){

alert("Camera not ready");

return;

}

document.getElementById("scanStatus").innerText =
"Scanning Document...";

/* TAKE PHOTO */

const canvas = document.createElement("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

const image =
canvas.toDataURL("image/jpeg",0.9);

/* OCR */

const result = await Tesseract.recognize(

image,
"eng",
{
logger:m=>console.log(m)
}

);

const text = result.data.text;

/* =========================
   STEP 1
========================= */

if(currentStep === 1){

currentVehicle = parseVehicle(text);

document.getElementById("scanOutput").innerText =

JSON.stringify(currentVehicle,null,2);

document.getElementById("scanStatus").innerHTML =

"<span class='success'>Vehicle Disc Captured ✔</span>";

document.getElementById("scanStep").innerText =

"STEP 2: Scan Owner ID";

currentStep = 2;

}

/* =========================
   STEP 2
========================= */

else{

let ownerData = parseOwner(text);

/* SAVE FIREBASE */

await addDoc(collection(db,"vehicleAccessLogs"),{

vehicle: currentVehicle,

owner: ownerData,

time: Date.now()

});

document.getElementById("scanOutput").innerText =

JSON.stringify({

vehicle: currentVehicle,
owner: ownerData

},null,2);

document.getElementById("scanStatus").innerHTML =

"<span class='success'>Saved Successfully ✔</span>";

document.getElementById("scanStep").innerText =

"STEP 1: Scan Vehicle Disc";

currentStep = 1;
currentVehicle = null;

}

};

/* =========================
   VERIFY VISITOR CODE
========================= */

window.verifyVisitorCode = async function(){

let code =
document.getElementById("verifyCode").value;

if(!code){

alert("Enter access code");

return;

}

const q = query(

collection(db,"visitorCodes"),

where("code","==", code)

);

const snap = await getDocs(q);

if(snap.empty){

document.getElementById("verifyResult").innerHTML =

"<p class='error'>INVALID CODE ❌</p>";

return;

}

let data = snap.docs[0].data();

/* EXPIRED */

if(Date.now() > data.expiry){

document.getElementById("verifyResult").innerHTML =

"<p class='error'>ACCESS DENIED — CODE EXPIRED ❌</p>";

}

/* VALID */

else{

document.getElementById("verifyResult").innerHTML =

`
<p class="success">

ACCESS GRANTED ✔

<br><br>

Resident: ${data.resident}

<br>

Visitor: ${data.visitor}

</p>
`;

}

};

</script>

</body>
</html>
