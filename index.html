<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JACKSON SMART TECHNOLOGIES SCANNER</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0a0a0a;
color:white;
}

header{
text-align:center;
padding:12px;
background:#111;
}

.container{padding:12px;max-width:800px;margin:auto;}

.card{
background:#1c1c1c;
padding:12px;
border-radius:10px;
margin-top:10px;
}

video{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
}

pre{white-space:pre-wrap;}
.success{color:#00ff88;}
</style>
</head>

<body>

<header>
<h2>⚡JACKSON SMART TECHNOLOGIES SCANNER</h2>
<p>RUA VISTA EXT36 SMART INTELLIGENCE SYSTEM</p>
</header>

<div class="container">

<div class="card">
<h3 id="step">STEP 1: Scan Vehicle Disc</h3>

<video id="video" autoplay playsinline muted></video>

<button onclick="scan()">SCAN (FAST MODE)</button>

<p id="status">Starting...</p>
<pre id="out"></pre>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIza...",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26",
storageBucket: "jackson-smart-technologi-1db26.appspot.com",
appId: "1:400637493049:web:xxxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

let step = 1;
let vehicle = null;

/* CAMERA */
async function startCam(){
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});
video.srcObject = stream;
await video.play();
document.getElementById("status").innerText="Camera Ready ⚡";
}
startCam();

/* FAST OCR ENGINE (REUSED STYLE) */
const OCR_CONFIG = {
  logger: () => {},
  tessedit_pageseg_mode: 6
};

/* FAST PREPROCESS */
function fastCanvas(video){
const c=document.createElement("canvas");

/* 🔥 SMALL SIZE = FAST OCR */
c.width=640;
c.height=360;

const ctx=c.getContext("2d");
ctx.drawImage(video,0,0,640,360);

return c.toDataURL("image/jpeg",0.6);
}

/* CLEAN */
function clean(t){
return t.toUpperCase().replace(/[^A-Z0-9\s]/g," ");
}

/* PARSER (FAST REGEX ONLY) */
function parseVehicle(t){

return {
vin: t.match(/\b[A-HJ-NPR-Z0-9]{17}\b/)?.[0] || "",
plate: t.match(/\b[A-Z0-9]{2,3}\s?\d{3,6}\s?(GP|MP|EC|ZN|FS|WC)\b/)?.[0] || "",
make: ["TOYOTA","BMW","MAZDA","VW","FORD","NISSAN"].find(b=>t.includes(b)) || ""
};
}

function parseID(t){
return {
id: t.match(/\b\d{13}\b/)?.[0] || "",
name: t.match(/\b[A-Z][A-Z]+\s[A-Z][A-Z]+\b/)?.[0] || ""
};
}

/* ⚡ FAST SCAN */
window.scan = async function(){

document.getElementById("status").innerText="Scanning ⚡";

const img = fastCanvas(video);

/* 🔥 FAST OCR CALL */
const res = await Tesseract.recognize(img,"eng",OCR_CONFIG);

const text = clean(res.data.text);

/* STEP LOGIC */
if(step===1){

vehicle = parseVehicle(text);

document.getElementById("out").innerText = JSON.stringify(vehicle,null,2);

document.getElementById("step").innerText = "STEP 2: Scan ID";

document.getElementById("status").innerHTML="<span class='success'>Vehicle Captured ⚡</span>";

step=2;
return;
}

const owner = parseID(text);

await addDoc(collection(db,"vehicleAccessLogs"),{
vehicle,
owner,
time:Date.now()
});

document.getElementById("out").innerText = JSON.stringify({vehicle,owner},null,2);

document.getElementById("status").innerHTML="<span class='success'>SAVED FAST ✔</span>";

document.getElementById("step").innerText="STEP 1: Scan Vehicle";

step=1;
vehicle=null;

};

</script>

</body>
</html>
