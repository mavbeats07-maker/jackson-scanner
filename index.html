<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JST AI Smart Estate Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
color:white;
}

.container{padding:15px;max-width:900px;margin:auto;}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:12px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

video{width:100%;border-radius:12px;background:black;}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

.step{
color:#00d9ff;
font-weight:bold;
}

.success{color:#00ff88}
.error{color:#ff4d4d}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

th,td{
padding:10px;
background:white;
color:black;
}
th{background:#0a2a43;color:white;}
</style>
</head>

<body>

<div class="container">

<h2>🚗 JST AI PRO ESTATE SCANNER</h2>

<div class="card">
<p class="step" id="stepText">STEP 1: Scan Vehicle Disc</p>

<video id="video" autoplay playsinline></video>

<button onclick="scan()">SCAN DOCUMENT</button>

<p id="status">Initializing camera...</p>

<pre id="output"></pre>
</div>

<!-- SECURITY PANEL -->
<div class="card">
<h3>🔐 Security Panel</h3>
<input id="code" placeholder="Enter Access Code">
<button onclick="verify()">VERIFY ACCESS</button>
<p id="verifyOut"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

let step = 1;
let vehicleData = null;

/* FAST CAMERA */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:false
});
video.srcObject = stream;
await video.play();
document.getElementById("status").innerText = "Camera Ready ✔";
}catch(e){
document.getElementById("status").innerText = "Camera Error ❌";
}
}
startCamera();

/* CLEAN TEXT */
function clean(t){
return t.toUpperCase().replace(/[^A-Z0-9\s]/g," ");
}

/* FAST OCR CONFIG */
async function fastOCR(img){
return await Tesseract.recognize(img,"eng",{
logger:()=>{},
tessedit_char_whitelist:"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
});
}

/* VEHICLE PARSER */
function parseVehicle(text){

let vin = text.match(/[A-HJ-NPR-Z0-9]{17}/)?.[0] || "";

let plate = text.match(/[A-Z]{2,3}\s?\d{3,6}\s?(GP|MP|EC|ZN|KZN)?/)?.[0] || "";

let brands = ["TOYOTA","BMW","MAZDA","FORD","VW","NISSAN","MERCEDES","AUDI","HYUNDAI"];

let make = brands.find(b => text.includes(b)) || "";

return {vin,plate,make};
}

/* ID PARSER */
function parseID(text){

let id = text.match(/\b\d{13}\b/)?.[0] || "";

let name = text.match(/[A-Z][A-Z]+\s[A-Z][A-Z]+/)?.[0] || "";

let house = text.match(/\b\d{1,5}\b/)?.[0] || "";

return {id,name,house};
}

/* SCAN */
window.scan = async function(){

document.getElementById("status").innerText = "Scanning...";

const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

const img = canvas.toDataURL("image/jpeg",0.7);

/* OCR */
const res = await Tesseract.recognize(img,"eng");
const text = clean(res.data.text);

if(step === 1){

vehicleData = parseVehicle(text);

document.getElementById("output").innerText =
JSON.stringify(vehicleData,null,2);

document.getElementById("stepText").innerText =
"STEP 2: Scan ID Document";

step = 2;

document.getElementById("status").innerText =
"Vehicle captured ✔";

}else{

let owner = parseID(text);

await addDoc(collection(db,"vehicleAccessLogs"),{
vehicle: vehicleData,
owner: owner,
time: Date.now()
});

document.getElementById("output").innerText =
JSON.stringify({vehicleData,owner},null,2);

document.getElementById("status").innerText =
"Saved to Firebase ✔";

step = 1;
vehicleData = null;

document.getElementById("stepText").innerText =
"STEP 1: Scan Vehicle Disc";
}
};

/* SECURITY PANEL */
window.verify = async function(){

let code = document.getElementById("code").value;

const q = query(collection(db,"visitorCodes"),where("code","==",code));
const snap = await getDocs(q);

if(snap.empty){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>INVALID CODE</span>";
return;
}

let d = snap.docs[0].data();

if(Date.now() > d.expiry){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>EXPIRED</span>";
}else{
document.getElementById("verifyOut").innerHTML =
"<span class='success'>ACCESS GRANTED ✔</span>";
}
};

</script>

</body>
</html>
