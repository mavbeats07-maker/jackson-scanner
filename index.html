<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANPR Pro Scanner JST</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
color:white;
}

.container{padding:15px;max-width:900px;margin:auto;}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:14px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

video{
width:100%;
border-radius:12px;
background:black;
filter: contrast(1.3) brightness(1.1) grayscale(1);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

.step{color:#00d9ff;font-weight:bold;}
.success{color:#00ff88}
.error{color:#ff4d4d}
pre{white-space:pre-wrap;font-size:13px;}

.overlay{
position:absolute;
top:0;left:0;
width:100%;
height:100%;
border:2px solid #00ff88;
border-radius:12px;
pointer-events:none;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

.video-wrap{
position:relative;
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 JST ANPR PRO SCANNER (FAST MODE)</h2>

<div class="card">
<p class="step" id="stepText">STEP 1: Scan Vehicle Disc (CENTER ZONE ONLY)</p>

<div class="video-wrap">
<video id="video" autoplay playsinline muted></video>
<div class="overlay"></div>
</div>

<button onclick="scanDoc()">SCAN DOCUMENT (FAST)</button>

<p id="status">Starting camera...</p>

<pre id="output"></pre>
</div>

<div class="card">
<h3>🔐 Security Panel</h3>
<input id="code" placeholder="Enter Access Code">
<button onclick="verify()">VERIFY CODE</button>
<p id="verifyOut"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

let step = 1;
let vehicleData = null;

/* CAMERA */
async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:false
});
video.srcObject = stream;
await video.play();
document.getElementById("status").innerText = "AI Camera Ready ✔";
}
startCamera();

/* OCR CLEAN */
function clean(text){
return text.toUpperCase()
.replace(/[^A-Z0-9\s]/g," ")
.replace(/\s+/g," ")
.trim();
}

/* STRONG PLATE DETECTION */
function extractPlate(text){
const t = clean(text);

// STRICT SA FORMAT ONLY
const match = t.match(/\b[A-Z]{2,3}\s?\d{3,6}\b/);
return match ? match[0] : "";
}

/* CAR MAKE ONLY */
function extractMake(text){
const brands = [
"TOYOTA","BMW","MERCEDES","FORD","VW","VOLKSWAGEN",
"NISSAN","HYUNDAI","KIA","AUDI","ISUZU","HONDA",
"CHEVROLET","MITSUBISHI","LEXUS","JEEP","VOLVO"
];

text = clean(text);
for(let b of brands){
if(text.includes(b)) return b;
}
return "";
}

/* FAST OCR (IMPORTANT FIX) */
async function fastOCR(image){

return await Tesseract.recognize(image,"eng",{
tessedit_char_whitelist:
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ",
tessedit_pageseg_mode: 7
});
}

/* SCAN FUNCTION */
window.scanDoc = async function(){

document.getElementById("status").innerText = "Scanning AI...";

const canvas = document.createElement("canvas");

/* CROPPED CENTER AREA (IMPORTANT FIX) */
canvas.width = video.videoWidth * 0.7;
canvas.height = video.videoHeight * 0.4;

const ctx = canvas.getContext("2d");

ctx.drawImage(
video,
video.videoWidth*0.15,
video.videoHeight*0.3,
canvas.width,
canvas.height,
0,0,
canvas.width,
canvas.height
);

const img = canvas.toDataURL("image/jpeg",0.8);

/* FAST OCR */
const res = await fastOCR(img);
const text = res.data.text;

/* STEP LOGIC */
if(step === 1){

vehicleData = {
plate: extractPlate(text),
make: extractMake(text)
};

document.getElementById("output").innerText =
JSON.stringify(vehicleData,null,2);

document.getElementById("status").innerHTML =
"<span class='success'>PLATE + MAKE CAPTURED ✔</span>";

step = 2;
document.getElementById("stepText").innerText =
"STEP 2: Scan ID DOCUMENT";

}else{

await addDoc(collection(db,"vehicleAccessLogs"),{
vehicle: vehicleData,
time: Date.now()
});

document.getElementById("output").innerText =
JSON.stringify(vehicleData,null,2);

document.getElementById("status").innerHTML =
"<span class='success'>SAVED ✔ FAST MODE ACTIVE</span>";

step = 1;
vehicleData = null;

document.getElementById("stepText").innerText =
"STEP 1: Scan Vehicle Disc";
}
};

/* SECURITY PANEL */
window.verify = async function(){

const code = document.getElementById("code").value;

const q = query(collection(db,"visitorCodes"),where("code","==",code));
const snap = await getDocs(q);

if(snap.empty){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>INVALID CODE</span>";
return;
}

const d = snap.docs[0].data();

if(Date.now() > d.expiry){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>EXPIRED</span>";
}else{
document.getElementById("verifyOut").innerHTML =
"<span class='success'>ACCESS GRANTED ✔</span>";
}
};

</script>

</body>
</html>
