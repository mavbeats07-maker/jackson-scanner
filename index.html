<!DOCTYPE html>
<html>
<head>
  <title>AI Car Disc Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
      padding: 15px;
    }

    h2 { color: #00ffd5; }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
    }

    .card {
      background: #111;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
      text-align: left;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 10px #00ffd5;
    }

    .label {
      color: #00ffd5;
      font-weight: bold;
    }

    .value {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .loading {
      color: yellow;
    }
  </style>
</head>

<body>

<h2>🚗 AI Car Disc Scanner</h2>

<input type="file" accept="image/*" capture="environment" id="camera">
<br>
<button onclick="scanDisc()">📸 Scan Disc</button>

<div id="status"></div>

<div id="result" class="card" style="display:none;">
  <div><span class="label">Registration:</span> <div id="reg" class="value"></div></div>
  <div><span class="label">Make:</span> <div id="make" class="value"></div></div>
  <div><span class="label">Model:</span> <div id="model" class="value"></div></div>
  <div><span class="label">VIN:</span> <div id="vin" class="value"></div></div>
  <div><span class="label">Expiry Date:</span> <div id="expiry" class="value"></div></div>
  <div><span class="label">Disc Number:</span> <div id="disc" class="value"></div></div>
</div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= OPENAI ================= */
const OPENAI_API_KEY = "YOUR_OPENAI_API_KEY";

/* ================= MAIN FUNCTION ================= */
async function scanDisc() {
  const file = document.getElementById("camera").files[0];
  if (!file) return alert("Take a photo first");

  document.getElementById("status").innerHTML =
    "<p class='loading'>🔍 AI is analyzing disc...</p>";

  const base64 = await toBase64(file);

  const response = await fetch("https://api.openai.com/v1/responses", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + OPENAI_API_KEY
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      input: [
        {
          role: "user",
          content: [
            {
              type: "input_text",
              text: `
Extract vehicle disc information and return ONLY JSON:

{
  "registration_number": "",
  "vehicle_make": "",
  "vehicle_model": "",
  "vin_number": "",
  "expiry_date": "",
  "disc_number": ""
}

Rules:
- No guessing
- If not visible return null
- JSON only
              `
            },
            {
              type: "input_image",
              image_base64: base64.split(",")[1]
            }
          ]
        }
      ]
    })
  });

  const data = await response.json();
  let text = data.output?.[0]?.content?.[0]?.text || "{}";

  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch {
    parsed = {};
  }

  /* ================= SHOW ON SCREEN ================= */
  document.getElementById("status").innerHTML = "✅ Scan Complete";

  document.getElementById("result").style.display = "block";

  document.getElementById("reg").innerText = parsed.registration_number || "Not found";
  document.getElementById("make").innerText = parsed.vehicle_make || "Not found";
  document.getElementById("model").innerText = parsed.vehicle_model || "Not found";
  document.getElementById("vin").innerText = parsed.vin_number || "Not found";
  document.getElementById("expiry").innerText = parsed.expiry_date || "Not found";
  document.getElementById("disc").innerText = parsed.disc_number || "Not found";

  /* ================= SAVE TO FIREBASE ================= */
  await db.collection("scans").add({
    result: parsed,
    timestamp: new Date().toISOString()
  });
}

/* ================= BASE64 ================= */
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}
</script>

</body>
</html>
