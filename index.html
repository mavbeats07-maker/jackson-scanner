<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SA Vehicle Disc Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b0f14;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:900px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
}

video{
width:100%;
border-radius:12px;
background:black;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:15px;
background:#0f172a;
padding:12px;
border-radius:10px;
line-height:1.8;
}

span{
color:#22c55e;
font-weight:bold;
}

.status{
margin-top:10px;
color:#38bdf8;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>🚗 SA Vehicle Disc Scanner</h2>

<video id="video" autoplay playsinline></video>

<button onclick="startScan()">START SCAN</button>

<p class="status" id="status">Ready</p>

<div class="result" id="output">
Plate: <span>-</span><br>
VIN: <span>-</span><br>
Engine: <span>-</span><br>
Disc Number: <span>-</span><br>
Raw Data: <span>-</span>
</div>

</div>

</div>

<script>
const video = document.getElementById("video");
const statusEl = document.getElementById("status");
const output = document.getElementById("output");

let scanner = null;

/* CAMERA */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{ facingMode:"environment" }
});

video.srcObject = stream;
await video.play();

statusEl.innerText = "Camera ready ✔";

}catch(err){
statusEl.innerText = "Camera blocked ❌";
}
}
startCamera();

/* BARCODE SCANNER */
async function startScan(){

statusEl.innerText = "Scanning disc barcode...";

try{

if(!scanner){
scanner = new ZXingBrowser.BrowserMultiFormatReader();
}

/* LIVE SCAN (IMPORTANT FIX) */
const result = await scanner.decodeOnceFromVideoElement(video);

const text = result.text || "";

statusEl.innerText = "Disc detected ✔";

/* =========================
EXTRACT SA DISC DATA
========================= */

let plate = "";
let vin = "";
let engine = "";
let disc = "";

/* clean text */
const data = text.toUpperCase();

/* plate */
const plateMatch = data.match(/\b[A-Z]{2,3}\d{2,6}[A-Z]{0,2}\b/);
if(plateMatch) plate = plateMatch[0];

/* VIN */
const vinMatch = data.match(/\b[A-HJ-NPR-Z0-9]{17}\b/);
if(vinMatch) vin = vinMatch[0];

/* engine */
const engineMatch = data.match(/\b[A-Z0-9]{6,15}\b/);
if(engineMatch) engine = engineMatch[0];

/* disc number */
const discMatch = data.match(/\b\d{8,12}\b/);
if(discMatch) disc = discMatch[0];

/* SHOW OUTPUT */
output.innerHTML = `
Plate: <span>${plate || "-"}</span><br>
VIN: <span>${vin || "-"}</span><br>
Engine: <span>${engine || "-"}</span><br>
Disc Number: <span>${disc || "-"}</span><br>
Raw Data: <span>${text}</span>
`;

}catch(err){

console.log(err);
statusEl.innerText = "No barcode detected ❌ Try again";

}

}
</script>

</body>
</html>
