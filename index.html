<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST Scanner LIVE</title>

<style>
body{
background:black;
color:white;
font-family:Segoe UI;
text-align:center;
}

.alert{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:red;
display:none;
color:white;
font-size:30px;
padding-top:120px;
z-index:9999;
}
</style>

</head>

<body>

<h2>JST SECURITY SCANNER</h2>
<p>Waiting for panic alerts...</p>

<div class="alert" id="alertBox">
🚨 PANIC ALERT RECEIVED <br><br>
<a id="mapLink" target="_blank" style="color:white;">VIEW LOCATION</a>
</div>

<audio id="siren">
<source src="https://actions.google.com/sounds/v1/alarms/police_siren.ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
query,
orderBy,
limit,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const siren = document.getElementById("siren");

/* LIVE PANIC LISTENER */
const q = query(collection(db,"panicAlerts"),orderBy("time","desc"),limit(1));

onSnapshot(q,(snap)=>{

snap.docChanges().forEach(change=>{

if(change.type==="added"){

const d=change.doc.data();

/* PLAY SIREN */
siren.loop=true;
siren.play().catch(()=>{});

/* SHOW ALERT */
document.getElementById("alertBox").style.display="block";

document.getElementById("mapLink").href=
`https://maps.google.com/?q=${d.lat},${d.lng}`;

}
});

});

</script>

</body>
</html>
