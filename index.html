<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackson Smart Technologies Pro Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:
linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1950&q=80");
background-size:cover;
background-position:center;
min-height:100vh;
color:white;
}

.container{
max-width:950px;
margin:auto;
padding:15px;
}

h2{
margin-bottom:15px;
text-align:center;
}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:16px;
margin-bottom:15px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.15);
}

.videoWrap{
position:relative;
overflow:hidden;
border-radius:15px;
}

video{
width:100%;
border-radius:15px;
background:black;
filter:contrast(1.2) brightness(1.08) saturate(1.15);
}

.overlay{
position:absolute;
top:28%;
left:18%;
width:64%;
height:26%;
border:3px solid #00ff88;
border-radius:12px;
box-shadow:0 0 20px #00ff88;
pointer-events:none;
animation:pulse 1.2s infinite;
}

.scanLine{
position:absolute;
left:18%;
width:64%;
height:3px;
background:#00ff88;
top:28%;
box-shadow:0 0 15px #00ff88;
animation:scanMove 2s linear infinite;
pointer-events:none;
}

@keyframes pulse{
0%{opacity:.5}
50%{opacity:1}
100%{opacity:.5}
}

@keyframes scanMove{
0%{top:28%}
50%{top:52%}
100%{top:28%}
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
font-size:15px;
transition:.2s;
}

button:hover{
background:#06304d;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

.step{
color:#00d9ff;
font-weight:bold;
margin-bottom:10px;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff4d4d;
font-weight:bold;
}

.result{
margin-top:15px;
background:rgba(0,0,0,0.45);
padding:12px;
border-radius:10px;
line-height:1.8;
}

.result span{
color:#00ff88;
font-weight:bold;
}

footer{
text-align:center;
padding:15px;
background:rgba(0,0,0,0.75);
margin-top:20px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h2>🚗 Jackson Smart Technologies Pro Scanner</h2>

<div class="card">

<p class="step" id="stepText">
STEP 1 : Scan Vehicle Disc
</p>

<div class="videoWrap">

<video id="video" autoplay playsinline muted></video>

<div class="overlay"></div>
<div class="scanLine"></div>

</div>

<button onclick="scan()">
SCAN DOCUMENT
</button>

<p id="status" style="margin-top:10px;">
Starting camera...
</p>

<div class="result" id="output">

Plate : <span>-</span><br>
Car Make : <span>-</span><br>
ID Number : <span>-</span>

</div>

</div>

<!-- SECURITY -->

<div class="card">

<h3>🔐 Security Panel</h3>

<input id="code" placeholder="Enter Access Code">

<button onclick="verify()">
VERIFY ACCESS
</button>

<p id="verifyOut"></p>

</div>

</div>

<footer>
THIS SYSTEM REMAINS PROPERTY OF JACKSON SMART TECHNOLOGIES (PTY) LTD
</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

let step = 1;
let vehicleData = {};
let scanning = false;

/* CAMERA */

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment",
width:{ideal:1280},
height:{ideal:720}
},

audio:false

});

video.srcObject = stream;

await video.play();

document.getElementById("status").innerHTML =
"<span class='success'>Camera Ready ✔</span>";

}catch(err){

document.getElementById("status").innerHTML =
"<span class='error'>Camera Failed ❌</span>";

}

}

startCamera();

/* CLEAN TEXT */

function clean(text){

return text
.toUpperCase()
.replace(/[^A-Z0-9\s]/g," ")
.replace(/\s+/g," ")
.trim();

}

/* GET SOUTH AFRICAN NUMBER PLATE */

function getPlate(text){

text = clean(text);

const provinces = [

"GP",
"MP",
"NW",
"FS",
"EC",
"NC",
"WC",
"KZN"

];

const licencePatterns = [

/LICENCE\s*NO[:\s]*([A-Z0-9\s]+)/i,
/LISENSIE\s*NR[:\s]*([A-Z0-9\s]+)/i,
/REGISTRATION[:\s]*([A-Z0-9\s]+)/i

];

let possibleText = text;

for(const reg of licencePatterns){

const match = text.match(reg);

if(match && match[1]){

possibleText = match[1];
break;

}

}

const patterns = [

/\b[A-Z]{2,3}\s?\d{2,6}\s?(GP|MP|NW|FS|EC|NC|WC|KZN)\b/g,
/\b[A-Z]{2}\s?\d{3,6}\s?(GP|MP|NW|FS|EC|NC|WC|KZN)\b/g,
/\b[A-Z]{1,3}\s?\d{2,6}\s?(GP|MP|NW|FS|EC|NC|WC|KZN)\b/g

];

let candidates = [];

for(const reg of patterns){

const found = possibleText.match(reg);

if(found){

for(let plate of found){

plate = plate
.replace(/\s+/g,"")
.trim();

const ending = provinces.find(p =>
plate.endsWith(p)
);

if(
ending &&
plate.length >= 6 &&
plate.length <= 12 &&
!plate.includes("VIN") &&
!plate.includes("RSA") &&
!plate.includes("ENGINE")
){
candidates.push(plate);
}

}

}

}

if(candidates.length){

candidates.sort((a,b)=>b.length-a.length);

return candidates[0];

}

return "";

}

/* GET VEHICLE MAKE */

function getMake(text){

text = clean(text);

const brands = [

"TOYOTA",
"VOLKSWAGEN",
"VW",
"FORD",
"BMW",
"MERCEDES",
"AUDI",
"NISSAN",
"HYUNDAI",
"KIA",
"ISUZU",
"HONDA",
"CHEVROLET",
"MITSUBISHI",
"MAZDA",
"RENAULT",
"SUZUKI",
"LEXUS",
"VOLVO",
"JEEP",
"LANDROVER",
"RANGE ROVER",
"MINI"

];

for(const brand of brands){

const regex =
new RegExp("\\b" + brand + "\\b","i");

if(regex.test(text)){

if(brand === "VW"){
return "VOLKSWAGEN";
}

return brand;

}

}

return "";

}

/* GET SA ID */

function getID(text){

text = clean(text);

const id = text.match(/\b\d{13}\b/);

return id ? id[0] : "";

}

/* FAST OCR */

async function scanOCR(image){

return await Tesseract.recognize(
image,
"eng",
{
logger:()=>{},

tessedit_pageseg_mode:"6",

tessedit_char_whitelist:
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
}
);

}

/* MAIN SCAN */

window.scan = async function(){

if(scanning) return;

scanning = true;

document.getElementById("status").innerHTML =
"Scanning...";

try{

const canvas = document.createElement("canvas");

canvas.width = video.videoWidth * 0.64;
canvas.height = video.videoHeight * 0.26;

const ctx = canvas.getContext("2d");

ctx.drawImage(

video,

video.videoWidth * 0.18,
video.videoHeight * 0.28,

canvas.width,
canvas.height,

0,
0,

canvas.width,
canvas.height

);

/* IMAGE PREPROCESS */

const imageData =
ctx.getImageData(0,0,canvas.width,canvas.height);

const data = imageData.data;

for(let i=0;i<data.length;i+=4){

const avg =
(data[i] + data[i+1] + data[i+2]) / 3;

const value = avg > 140 ? 255 : 0;

data[i] = value;
data[i+1] = value;
data[i+2] = value;

}

ctx.putImageData(imageData,0,0);

const img =
canvas.toDataURL("image/jpeg",0.8);

const result = await scanOCR(img);

const text = result.data.text;

/* STEP 1 */

if(step === 1){

const plate = getPlate(text);
const make = getMake(text);

if(!plate){

document.getElementById("status").innerHTML =
"<span class='error'>Number Plate Not Detected ❌</span>";

scanning = false;
return;

}

vehicleData = {
plate,
make
};

document.getElementById("output").innerHTML =

`
Plate : <span>${plate || "-"}</span><br>
Car Make : <span>${make || "-"}</span><br>
ID Number : <span>-</span>
`;

document.getElementById("status").innerHTML =
"<span class='success'>Vehicle Disc Captured ✔</span>";

document.getElementById("stepText").innerText =
"STEP 2 : Scan South African ID";

step = 2;

scanning = false;
return;

}

/* STEP 2 */

const idNumber = getID(text);

if(!idNumber){

document.getElementById("status").innerHTML =
"<span class='error'>Invalid ID Scan ❌</span>";

scanning = false;
return;

}

/* SAVE TO FIREBASE */

await addDoc(
collection(db,"vehicleAccessLogs"),
{

vehicle:{
plate:vehicleData.plate || "",
make:vehicleData.make || ""
},

owner:{
idNumber:idNumber
},

time:Date.now()

}
);

document.getElementById("output").innerHTML =

`
Plate : <span>${vehicleData.plate || "-"}</span><br>
Car Make : <span>${vehicleData.make || "-"}</span><br>
ID Number : <span>${idNumber}</span>
`;

document.getElementById("status").innerHTML =
"<span class='success'>Saved Successfully ✔</span>";

step = 1;
vehicleData = {};

document.getElementById("stepText").innerText =
"STEP 1 : Scan Vehicle Disc";

}catch(err){

console.error(err);

document.getElementById("status").innerHTML =
"<span class='error'>Scan Failed ❌</span>";

}

scanning = false;

};

/* VERIFY ACCESS CODE */

window.verify = async function(){

const code =
document.getElementById("code").value.trim();

if(!code){

document.getElementById("verifyOut").innerHTML =
"<span class='error'>Enter Code</span>";

return;

}

const q = query(
collection(db,"visitorCodes"),
where("code","==",code)
);

const snap = await getDocs(q);

if(snap.empty){

document.getElementById("verifyOut").innerHTML =
"<span class='error'>INVALID CODE ❌</span>";

return;

}

const d = snap.docs[0].data();

if(Date.now() > d.expiry){

document.getElementById("verifyOut").innerHTML =
"<span class='error'>CODE EXPIRED ❌</span>";

}else{

document.getElementById("verifyOut").innerHTML =
"<span class='success'>ACCESS GRANTED ✔</span>";

}

};

</script>

</body>
</html>
