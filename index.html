<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JST Security System</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
color:white;
}

.container{padding:15px;max-width:900px;margin:auto;}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

video{
width:100%;
border-radius:10px;
background:black;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#0a2a43;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{background:#06304d;}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

.result{
margin-top:10px;
padding:10px;
background:rgba(0,0,0,0.4);
border-radius:8px;
}

.success{color:#00ff88;}
.error{color:#ff4d4d;}

#panicPanel{
display:none;
border:2px solid red;
padding:10px;
}

.alertMode{
animation:flash 0.6s infinite;
}

@keyframes flash{
0%{background:#1b0000;}
50%{background:#8b0000;}
100%{background:#1b0000;}
}

.stopBtn{background:#b30000;}
iframe{
width:100%;
height:250px;
border:none;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 JST Security System</h2>

<!-- PANIC -->
<div class="card" id="panicPanel">
<h2 style="color:red;">🚨 LIVE PANIC ALERT</h2>
<p id="panicText"></p>
<iframe id="panicMap"></iframe>
<button class="stopBtn" onclick="stopAlarm()">STOP ALARM</button>
</div>

<!-- CAMERA -->
<div class="card">
<video id="video" autoplay playsinline muted></video>
<button onclick="scanBarcode()">SCAN DISC</button>
<p id="status">Starting camera...</p>

<div class="result" id="output">
Plate: <span>-</span><br>
VIN: <span>-</span>
</div>
</div>

<!-- SECURITY -->
<div class="card">
<h3>🔐 Security Panel</h3>
<input id="code" placeholder="Enter Access Code"/>
<button onclick="verify()">VERIFY</button>
<p id="verifyOut"></p>
</div>

</div>

<audio id="siren" loop>
<source src="https://actions.google.com/sounds/v1/emergency/police_siren.ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* GLOBALS */
let scanStep = 1;
let vehicleData = {};
let activePanicId = null;

const video = document.getElementById("video");
const siren = document.getElementById("siren");

/* CAMERA */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});
video.srcObject = stream;
await video.play();
document.getElementById("status").innerText = "Camera ready ✔";
}catch(e){
document.getElementById("status").innerHTML =
"<span class='error'>Camera blocked</span>";
}
}
startCamera();

/* PANIC REAL-TIME */
onSnapshot(collection(db,"panicAlerts"), (snap)=>{

snap.docChanges().forEach(change=>{

if(change.type==="added"){

const d = change.doc.data();
const id = change.doc.id;

if(id === activePanicId) return;
activePanicId = id;

/* SHOW */
document.getElementById("panicPanel").style.display="block";
document.getElementById("panicText").innerHTML=
`🚨 PANIC ALERT<br><br>
Lat: ${d.latitude}<br>
Lng: ${d.longitude}<br>
Time: ${new Date(d.time).toLocaleString()}`;

document.getElementById("panicMap").src=
`https://maps.google.com/maps?q=${d.latitude},${d.longitude}&z=18&output=embed`;

/* SOUND */
siren.currentTime = 0;
siren.play().catch(()=>{});

document.body.classList.add("alertMode");

navigator.vibrate?.([500,200,500,200,1000]);

}
});
});

/* STOP */
window.stopAlarm = function(){
siren.pause();
siren.currentTime = 0;

document.body.classList.remove("alertMode");
document.getElementById("panicPanel").style.display="none";
document.getElementById("panicText").innerHTML="";
document.getElementById("panicMap").src="";
activePanicId = null;
};

/* BARCODE SCAN (STEP 1 ONLY) */
const codeReader = new ZXingBrowser.BrowserMultiFormatReader();

window.scanBarcode = async function(){

const status = document.getElementById("status");

status.innerHTML = "Scanning barcode...";

try{

const result = await codeReader.decodeOnceFromVideoDevice(null, video);

const text = result.text;

vehicleData.rawBarcode = text;

document.getElementById("output").innerHTML=
`Barcode: <b>${text}</b><br>VIN: -`;

status.innerHTML = "<span class='success'>Step 1 complete ✔</span>";

scanStep = 2;

}catch(e){
status.innerHTML="<span class='error'>Barcode not detected</span>";
}
};

/* VERIFY */
window.verify = async function(){

const code = document.getElementById("code").value.trim();
const out = document.getElementById("verifyOut");

const q = query(collection(db,"visitorCodes"),where("code","==",code));
const snap = await getDocs(q);

if(snap.empty){
out.innerHTML="<span class='error'>INVALID CODE</span>";
return;
}

const d = snap.docs[0].data();

out.innerHTML=`
<span class='success'>ACCESS GRANTED ✔</span><br>
Resident: ${d.resident}<br>
House: ${d.houseNumber}
`;

};

</script>

</body>
</html>
