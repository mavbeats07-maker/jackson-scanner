<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JST FIXED SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#111;color:white}
.container{padding:15px;max-width:900px;margin:auto}
.card{background:#222;padding:15px;margin-bottom:15px;border-radius:10px}
video{width:100%;border-radius:10px}
button{width:100%;padding:12px;margin-top:10px;background:#0a2a43;color:white;border:none}
input{width:100%;padding:10px;margin-top:10px}
#panicPanel{display:none;background:#300;border:2px solid red;padding:10px}
.alert{animation:flash 0.6s infinite}
@keyframes flash{0%{background:#300}50%{background:#800}100%{background:#300}}
</style>
</head>

<body>

<div class="container">

<h2>🚗 JST SYSTEM (STABLE FIX)</h2>

<div class="card" id="panicPanel">
<h3>🚨 PANIC ALERT</h3>
<p id="panicText"></p>
<iframe id="map" style="width:100%;height:200px;border:0"></iframe>
<button onclick="stopAlarm()">STOP ALARM</button>
</div>

<div class="card">
<video id="video" autoplay playsinline></video>
<button onclick="scanDisc()">SCAN DISC</button>
<p id="status">Loading camera...</p>
<div id="output">Ready</div>
</div>

<div class="card">
<h3>VERIFY</h3>
<input id="code"/>
<button onclick="verify()">VERIFY</button>
<p id="verifyOut"></p>
</div>

</div>

<audio id="siren" loop>
<source src="https://actions.google.com/sounds/v1/emergency/police_siren.ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let video = document.getElementById("video");
let siren = document.getElementById("siren");
let lastPanic = null;

/* CAMERA (MUST LOAD FIRST) */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});
video.srcObject = stream;
await video.play();
document.getElementById("status").innerText="Camera ready ✔";
}catch(e){
document.getElementById("status").innerText="Camera blocked ❌";
}
}
startCamera();

/* PANIC REAL TIME */
onSnapshot(collection(db,"panicAlerts"),snap=>{

snap.docChanges().forEach(c=>{

if(c.type==="added"){

const d=c.doc.data();
const id=c.doc.id;

if(id===lastPanic) return;
lastPanic=id;

document.getElementById("panicPanel").style.display="block";
document.body.classList.add("alert");

document.getElementById("panicText").innerHTML=
`Lat:${d.latitude}<br>Lng:${d.longitude}`;

document.getElementById("map").src=
`https://maps.google.com/maps?q=${d.latitude},${d.longitude}&z=18&output=embed`;

siren.currentTime=0;
siren.play().catch(()=>{});

}
});
});

/* STOP BUTTON */
window.stopAlarm=function(){
siren.pause();
siren.currentTime=0;
document.getElementById("panicPanel").style.display="none";
document.body.classList.remove("alert");
};

/* CAMERA SCAN */
const reader = new ZXingBrowser.BrowserMultiFormatReader();

window.scanDisc = async function(){

const status=document.getElementById("status");
const output=document.getElementById("output");

status.innerText="Scanning...";

try{

const result = await reader.decodeOnceFromVideoDevice(null,video);

output.innerHTML="BARCODE:<br>"+result.text;

status.innerHTML="✔ Done";

}catch(e){
status.innerHTML="❌ No barcode detected";
console.log(e);
}

};

/* VERIFY */
window.verify = async function(){

const code=document.getElementById("code").value;
const out=document.getElementById("verifyOut");

const q=query(collection(db,"visitorCodes"),where("code","==",code));
const snap=await getDocs(q);

if(snap.empty){
out.innerHTML="INVALID ❌";
return;
}

const d=snap.docs[0].data();

out.innerHTML="ACCESS ✔ "+d.resident;

};

</script>

</body>
</html>
