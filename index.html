<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Jackson smart technologies Security Control System</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,0.82),rgba(0,0,0,0.90)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");

background-size:cover;
background-position:center;
min-height:100vh;
color:white;
overflow-x:hidden;
}

.container{
padding:15px;
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.10);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.12);
}

h2,h3{
margin-bottom:10px;
}

.videoWrap{
position:relative;
}

video{
width:100%;
border-radius:15px;
background:black;
}

/* =========================
SCAN BOX
========================= */

.scanBox{
position:absolute;
border:3px solid #00ff88;
border-radius:12px;
box-shadow:0 0 25px #00ff88;
pointer-events:none;
transition:0.3s;
}

.scanLine{
position:absolute;
height:3px;
background:#00ff88;
box-shadow:0 0 15px #00ff88;
pointer-events:none;
animation:scanMove 2s linear infinite;
}

@keyframes scanMove{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(140px);
}

100%{
transform:translateY(0px);
}

}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#06304d;
}

.stopBtn{
background:#b30000;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

.result{
margin-top:15px;
background:rgba(0,0,0,0.45);
padding:12px;
border-radius:10px;
line-height:1.8;
word-break:break-word;
}

.result span{
color:#00ff88;
font-weight:bold;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff4d4d;
font-weight:bold;
}

.step{
color:#00d9ff;
font-weight:bold;
margin-bottom:10px;
}

/* =========================
PANIC ALERT
========================= */

.alertMode{
animation:flashRed 0.7s infinite;
}

@keyframes flashRed{

0%{
background:#1b0000;
}

50%{
background:#8b0000;
}

100%{
background:#1b0000;
}

}

#panicPanel{
display:none;
border:3px solid red;
}

#panicPanel iframe{
width:100%;
height:300px;
border:none;
border-radius:12px;
margin-top:15px;
}

.bigAlert{
font-size:34px;
font-weight:bold;
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>
🚗 JST Security Control System
</h2>

<!-- =========================
PANIC PANEL
========================= -->

<div class="card" id="panicPanel">

<div class="bigAlert">
🚨 LIVE PANIC ALERT
</div>

<br>

<p id="panicText"></p>

<iframe id="panicMap"></iframe>

<button
class="stopBtn"
onclick="stopAlarm()"
>
STOP ALARM
</button>

</div>

<!-- =========================
SCANNER
========================= -->

<div class="card">

<p class="step" id="stepText">
STEP 1 : Scan SA Vehicle Disc Barcode
</p>

<div class="videoWrap">

<video
id="video"
autoplay
playsinline
muted>
</video>

<div class="scanBox" id="scanBox"></div>

<div class="scanLine" id="scanLine"></div>

</div>

<button onclick="scan()">
SCAN DOCUMENT
</button>

<p id="status" style="margin-top:10px;">
Starting camera...
</p>

<div class="result" id="output">

Plate :
<span>-</span><br>

Make :
<span>-</span><br>

VIN :
<span>-</span><br>

Engine :
<span>-</span><br>

Disc Number :
<span>-</span><br>

ID Number :
<span>-</span>

</div>

</div>

<!-- =========================
SECURITY PANEL
========================= -->

<div class="card">

<h3>
🔐 Security Panel
</h3>

<input
id="code"
placeholder="Enter Access Code"
/>

<button onclick="verify()">
VERIFY ACCESS
</button>

<p id="verifyOut"></p>

</div>

</div>

<!-- =========================
SIREN
========================= -->

<audio
id="panicSiren"
loop
preload="auto"
>

<source
src="https://actions.google.com/sounds/v1/emergency/police_siren.ogg"
type="audio/ogg">

</audio>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* =========================
FIREBASE
========================= */

const firebaseConfig = {

apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",

authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",

projectId: "jackson-smart-technologi-1db26"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* =========================
ELEMENTS
========================= */

const video =
document.getElementById("video");

const statusText =
document.getElementById("status");

const output =
document.getElementById("output");

const panicAudio =
document.getElementById("panicSiren");

/* =========================
GLOBAL STATE
========================= */

let scanStep = 1;

let vehicleData = {};

let activePanicId = null;

let panicMuted = false;

/* =========================
CAMERA
========================= */

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
}
},

audio:false

});

video.srcObject = stream;

await video.play();

statusText.innerHTML =
"<span class='success'>Camera Ready ✔</span>";

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>Camera Blocked ❌</span>";

}

}

startCamera();

/* =========================
SCAN BOX
========================= */

function setScanBox(top,left,width,height){

const box =
document.getElementById("scanBox");

const line =
document.getElementById("scanLine");

box.style.top = top + "%";
box.style.left = left + "%";
box.style.width = width + "%";
box.style.height = height + "%";

line.style.top = (top + 5) + "%";
line.style.left = left + "%";
line.style.width = width + "%";

}

setScanBox(35,15,70,20);

/* =========================
PANIC SYSTEM
========================= */

onSnapshot(

collection(db,"panicAlerts"),

(snapshot)=>{

snapshot.docChanges().forEach(async(change)=>{

if(change.type !== "added"){
return;
}

const id =
change.doc.id;

const d =
change.doc.data();

if(id === activePanicId){
return;
}

activePanicId = id;

panicMuted = false;

document.getElementById("panicPanel").style.display =
"block";

document.getElementById("panicText").innerHTML =

`

Latitude:
<b>${d.latitude || "-"}</b>

<br><br>

Longitude:
<b>${d.longitude || "-"}</b>

<br><br>

Accuracy:
<b>${Math.round(d.accuracy || 0)}m</b>

<br><br>

Time:
<b>${new Date(d.time || Date.now()).toLocaleString()}</b>

`;

document.getElementById("panicMap").src =

`https://maps.google.com/maps?q=${d.latitude},${d.longitude}&z=18&output=embed`;

if(!panicMuted){

try{

panicAudio.pause();
panicAudio.currentTime = 0;
await panicAudio.play();

}catch(err){

console.log(err);

}

document.body.classList.add("alertMode");

navigator.vibrate?.([500,200,500,200,1000]);

}

});

}

/* STOP ALARM */

window.stopAlarm = function(){

panicMuted = true;

activePanicId = null;

panicAudio.pause();

panicAudio.currentTime = 0;

document.body.classList.remove("alertMode");

document.getElementById("panicPanel").style.display =
"none";

document.getElementById("panicText").innerHTML = "";

document.getElementById("panicMap").src = "";

};

/* =========================
VEHICLE PARSER
========================= */

function extractVehicleData(text){

text = text.toUpperCase();

const data = {

plate:"",
make:"",
vin:"",
engine:"",
discNumber:""

};

/* NUMBER PLATE */

const platePatterns = [

/\b[A-Z]{2,3}\d{2,6}[A-Z]{0,2}\b/g,
/\b[A-Z]{1,3}\s?\d{2,6}\s?[A-Z]{0,3}\b/g,
/\b\d{2,6}[A-Z]{2,3}\b/g

];

for(const pattern of platePatterns){

const match = text.match(pattern);

if(match){

data.plate =
match[0]
.replace(/\s/g,"")
.trim();

break;

}

}

/* VIN */

const vinMatch =
text.match(/\b[A-HJ-NPR-Z0-9]{17}\b/);

if(vinMatch){

data.vin = vinMatch[0];

}

/* ENGINE */

const engineMatch =
text.match(/\b[A-Z0-9]{6,15}\b/);

if(engineMatch){

data.engine = engineMatch[0];

}

/* DISC NUMBER */

const discMatch =
text.match(/\b\d{8,12}\b/);

if(discMatch){

data.discNumber = discMatch[0];

}

/* CAR MAKE */

const brands = [

"TOYOTA",
"VOLKSWAGEN",
"VW",
"BMW",
"MERCEDES",
"FORD",
"NISSAN",
"HYUNDAI",
"KIA",
"AUDI",
"ISUZU",
"HONDA",
"CHEVROLET",
"MITSUBISHI",
"LEXUS",
"VOLVO",
"SUZUKI",
"RENAULT",
"MAZDA",
"HAVAL",
"MAHINDRA"

];

for(let b of brands){

if(text.includes(b)){

data.make = b;
break;

}

}

return data;

}

/* =========================
MAIN SCANNER
========================= */

window.scan = async function(){

if(!video.videoWidth){

statusText.innerHTML =
"<span class='error'>Camera not ready ❌</span>";

return;

}

const canvas =
document.createElement("canvas");

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

/* =========================
STEP 1
SA DISC PDF417
========================= */

if(scanStep === 1){

statusText.innerHTML =
"Scanning SA vehicle disc...";

setScanBox(35,15,70,20);

try{

const hints = new Map();

hints.set(

ZXing.DecodeHintType.POSSIBLE_FORMATS,

[ZXing.BarcodeFormat.PDF_417]

);

const codeReader =
new ZXingBrowser.BrowserMultiFormatReader(
hints
);

const result =
await codeReader.decodeFromCanvas(canvas);

if(!result || !result.text){

statusText.innerHTML =
"<span class='error'>Disc barcode not detected ❌</span>";

return;

}

const rawText =
result.text;

/* EXTRACT VEHICLE INFO */

vehicleData =
extractVehicleData(rawText);

/* SAVE RAW */

vehicleData.rawBarcode = rawText;

/* OUTPUT */

output.innerHTML =

`

Plate:
<span>${vehicleData.plate || "-"}</span><br>

Make:
<span>${vehicleData.make || "-"}</span><br>

VIN:
<span>${vehicleData.vin || "-"}</span><br>

Engine:
<span>${vehicleData.engine || "-"}</span><br>

Disc Number:
<span>${vehicleData.discNumber || "-"}</span><br>

ID Number:
<span>-</span>

`;

statusText.innerHTML =
"<span class='success'>Vehicle Disc Captured ✔</span>";

scanStep = 2;

document.getElementById("stepText").innerText =
"STEP 2 : Scan ID / Driver License";

setScanBox(18,10,80,55);

return;

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>PDF417 Scan Failed ❌</span>";

return;

}

}

/* =========================
STEP 2
OCR ID
========================= */

if(scanStep === 2){

statusText.innerHTML =
"Scanning ID Number...";

try{

const result =
await Tesseract.recognize(

canvas.toDataURL(
"image/jpeg",
1.0
),

"eng"

);

const text =
result.data.text || "";

const idMatch =
text.match(/\d{13}/);

if(!idMatch){

statusText.innerHTML =
"<span class='error'>ID Number Not Found ❌</span>";

return;

}

const idNumber =
idMatch[0];

/* FINAL OUTPUT */

output.innerHTML =

`

Plate:
<span>${vehicleData.plate || "-"}</span><br>

Make:
<span>${vehicleData.make || "-"}</span><br>

VIN:
<span>${vehicleData.vin || "-"}</span><br>

Engine:
<span>${vehicleData.engine || "-"}</span><br>

Disc Number:
<span>${vehicleData.discNumber || "-"}</span><br>

ID Number:
<span>${idNumber}</span>

`;

statusText.innerHTML =
"<span class='success'>FULL SCAN COMPLETE ✔</span>";

scanStep = 1;

vehicleData = {};

document.getElementById("stepText").innerText =
"STEP 1 : Scan SA Vehicle Disc Barcode";

setScanBox(35,15,70,20);

}catch(err){

console.log(err);

statusText.innerHTML =
"<span class='error'>OCR Failed ❌</span>";

}

}

};

/* =========================
VERIFY ACCESS
========================= */

window.verify = async function(){

const out =
document.getElementById("verifyOut");

const code =
document.getElementById("code").value.trim();

if(!code){

out.innerHTML =
"<span class='error'>ENTER ACCESS CODE</span>";

return;

}

try{

const snap =
await getDocs(
collection(db,"visitorCodes")
);

let found = null;

snap.forEach((docSnap)=>{

const d =
docSnap.data();

if(String(d.code).trim() === code){

found = d;

}

});

if(!found){

out.innerHTML =
"<span class='error'>INVALID CODE ❌</span>";

return;

}

if(found.expiry){

if(Date.now() > found.expiry){

out.innerHTML =
"<span class='error'>CODE EXPIRED ❌</span>";

return;

}

}

out.innerHTML =

`

<span class='success'>
ACCESS GRANTED ✔
</span>

<br><br>

Resident:
<b>${found.resident || "-"}</b>

<br><br>

Visitor:
<b>${found.visitor || "-"}</b>

<br><br>

House:
<b>${found.houseNumber || "-"}</b>

`;

}catch(err){

console.log(err);

out.innerHTML =
"<span class='error'>VERIFY FAILED ❌</span>";

}

};

</script>

</body>
</html>
