<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JST Pro Security System</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
min-height:100vh;
color:white;
}

.container{padding:15px;max-width:950px;margin:auto;}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.12);
}

video{width:100%;border-radius:12px;background:black;}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

button:hover{background:#06304d;}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

.result{
margin-top:15px;
background:rgba(0,0,0,0.45);
padding:12px;
border-radius:10px;
}

.success{color:#00ff88;}
.error{color:#ff4d4d;}

.alertMode{animation:flash 0.7s infinite;}

@keyframes flash{
0%{background:#1b0000;}
50%{background:#8b0000;}
100%{background:#1b0000;}
}

#panicPanel{
display:none;
border:2px solid red;
}

iframe{
width:100%;
height:260px;
border:none;
border-radius:10px;
margin-top:10px;
}

.stopBtn{background:#b30000;}
</style>
</head>

<body>

<div class="container">

<h2>🚗 JST Pro Security System</h2>

<!-- PANIC PANEL -->
<div class="card" id="panicPanel">
<h2 style="color:red;">🚨 PANIC ALERT</h2>

<p id="panicText">Waiting...</p>

<iframe id="panicMap"></iframe>

<button class="stopBtn" onclick="stopAlarm()">STOP ALARM</button>
</div>

<!-- SCANNER -->
<div class="card">
<p id="stepText">STEP 1: Scan Vehicle Disc</p>

<video id="video" autoplay playsinline muted></video>

<button onclick="scan()">SCAN DOCUMENT</button>

<p id="status">Starting camera...</p>

<div class="result" id="output">
Plate : <span>-</span><br>
VIN : <span>-</span><br>
ID : <span>-</span>
</div>
</div>

<!-- SECURITY -->
<div class="card">
<h3>🔐 Security Panel</h3>

<input id="code" placeholder="Enter Access Code">
<button onclick="verify()">VERIFY ACCESS</button>
<p id="verifyOut"></p>
</div>

</div>

<!-- AUDIO -->
<audio id="panicSiren" loop>
<source src="https://actions.google.com/sounds/v1/emergency/police_siren.ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= CAMERA FIX ================= */
const video = document.getElementById("video");

async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{ facingMode:"environment" }
});

video.srcObject = stream;

await video.play();

document.getElementById("status").innerText =
"Camera ready ✔";

}catch(err){
document.getElementById("status").innerHTML =
"<span class='error'>Camera blocked ❌</span>";
}
}

startCamera();

/* ================= PANIC SYSTEM (FIXED 100%) ================= */
const panicAudio = document.getElementById("panicSiren");

window.activatePanic = async function(){

/* 🔊 INSTANT SIREN */
panicAudio.currentTime = 0;
panicAudio.play().catch(()=>{});
document.body.classList.add("alertMode");

/* 🔥 FETCH LIVE DATA */
document.getElementById("panicPanel").style.display = "block";
document.getElementById("panicText").innerHTML =
"<b style='color:yellow'>Fetching panic data...</b>";

try{

const snap = await getDocs(collection(db,"panicAlerts"));

if(snap.empty){
document.getElementById("panicText").innerHTML =
"<span class='error'>NO PANIC DATA FOUND</span>";
return;
}

/* FIND LATEST MANUALLY (NO INDEX ISSUES) */
let latest = null;

snap.forEach(doc=>{
const d = doc.data();
if(!latest || (d.time > (latest.time || 0))){
latest = d;
}
});

/* SHOW DATA */
const lat = latest.latitude ?? latest.lat;
const lng = latest.longitude ?? latest.lng;

document.getElementById("panicText").innerHTML = `
<b style="color:red;font-size:22px;">🚨 LIVE PANIC ALERT</b><br><br>
Latitude: ${lat || "N/A"}<br>
Longitude: ${lng || "N/A"}<br>
Time: ${new Date(latest.time || Date.now()).toLocaleString()}
`;

if(lat && lng){
document.getElementById("panicMap").src =
`https://maps.google.com/maps?q=${lat},${lng}&z=18&output=embed`;
}

}catch(err){
console.log(err);
document.getElementById("panicText").innerHTML =
"<span class='error'>Firebase error loading panic</span>";
}

};

window.stopAlarm = function(){
panicAudio.pause();
panicAudio.currentTime = 0;
document.body.classList.remove("alertMode");
};

/* ================= OCR ================= */
async function scanOCR(img){
return await Tesseract.recognize(img,"eng");
}

/* ================= ZXING ================= */
async function decodeBarcode(canvas){
try{
const reader = new ZXingBrowser.BrowserMultiFormatReader();
const res = await reader.decodeFromCanvas(canvas);
return res?.text || "";
}catch(e){return "";}
}

/* ================= SCANNER ================= */
window.scan = async function(){

const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

let barcode = await decodeBarcode(canvas);
let ocr = await scanOCR(canvas.toDataURL("image/jpeg"));

let text = (barcode || ocr.data.text || "").toUpperCase();

const plate = text.match(/[A-Z]{2,3}\d{2,6}/)?.[0] || "";
const vin = text.match(/[A-HJ-NPR-Z0-9]{17}/)?.[0] || "";

document.getElementById("output").innerHTML = `
Plate : <span>${plate}</span><br>
VIN : <span>${vin}</span><br>
ID : <span>-</span>
`;

document.getElementById("status").innerHTML =
"<span class='success'>Scan complete ✔</span>";
};

/* ================= VERIFY (FIXED) ================= */
window.verify = async function(){

const code = document.getElementById("code").value.trim();

if(!code){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>Enter code</span>";
return;
}

try{

const snap = await getDocs(collection(db,"visitorCodes"));

if(snap.empty){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>NO DATA</span>";
return;
}

let found = null;

snap.forEach(doc=>{
if(doc.data().code === code){
found = doc.data();
}
});

if(!found){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>INVALID CODE ❌</span>";
return;
}

document.getElementById("verifyOut").innerHTML = `
<span class="success">ACCESS GRANTED ✔</span><br><br>
Resident: ${found.resident}<br>
House: ${found.houseNumber}
`;

}catch(err){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>Verification error</span>";
}

};

</script>

</body>
</html>
