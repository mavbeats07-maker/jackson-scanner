<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JST Pro Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#111;
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

video{
width:100%;
border-radius:12px;
border:2px solid #00ff88;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:12px;
margin-top:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#06304d;
}

span{
color:#00ff88;
font-weight:bold;
}

.error{color:red;}
.success{color:#00ff88;}

</style>
</head>

<body>

<div class="container">

<h2>🚗 JST Vehicle Scanner</h2>

<video id="video" autoplay playsinline muted></video>

<div class="card">
<p>Plate: <span id="plate">-</span></p>
<p>Make: <span id="make">-</span></p>
<p>ID: <span id="id">-</span></p>
</div>

<button onclick="scanID()">SCAN SA ID</button>

<p id="status">Starting...</p>

</div>

<script type="module">

import { BrowserMultiFormatReader }
from "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm";

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ELEMENTS */
const video = document.getElementById("video");

let vehicleData = {};
let scanned = false;

/* ZXING */
const reader = new BrowserMultiFormatReader();

/* FORCE BACK CAMERA */
async function start(){

try{

const devices =
await BrowserMultiFormatReader.listVideoInputDevices();

const backCamera =
devices.find(d =>
d.label.toLowerCase().includes("back")
) || devices[0];

await reader.decodeFromVideoDevice(

backCamera.deviceId,
video,

(result,err)=>{

if(result && !scanned){

scanned = true;

const raw = result.text.toUpperCase();

/* EXTRACT PLATE */
const plate =
raw.match(/[A-Z]{2,3}\d{2,6}(GP|MP|NW|FS|EC|NC|WC|KZN)/);

const makes = [
"TOYOTA","BMW","FORD","VW","VOLKSWAGEN",
"MERCEDES","AUDI","NISSAN","HYUNDAI","KIA"
];

let make = "";

for(let m of makes){
if(raw.includes(m)){
make = (m==="VW")?"VOLKSWAGEN":m;
break;
}
}

vehicleData = {
plate: plate ? plate[0] : "",
make
};

document.getElementById("plate").innerText =
vehicleData.plate || "-";

document.getElementById("make").innerText =
vehicleData.make || "-";

document.getElementById("status").innerHTML =
"<span class='success'>Barcode Scanned ✔</span>";

setTimeout(()=>{ scanned=false; },3000);
}

}

);

}catch(err){
document.getElementById("status").innerHTML =
"<span class='error'>Camera Failed ❌</span>";
console.log(err);
}

}

start();

/* OCR FOR ID */
window.scanID = async function(){

try{

document.getElementById("status").innerText =
"Scanning ID...";

const canvas = document.createElement("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(video,0,0);

const img = canvas.toDataURL("image/jpeg");

const res =
await Tesseract.recognize(img,"eng");

const text =
res.data.text.replace(/\s+/g," ");

const id =
text.match(/\b\d{13}\b/);

if(!id){

document.getElementById("status").innerHTML =
"<span class='error'>ID Not Found</span>";
return;

}

document.getElementById("id").innerText = id[0];

/* SAVE FIREBASE */
await addDoc(collection(db,"vehicleAccessLogs"),{

vehicle:vehicleData,
owner:{ idNumber:id[0] },
time:Date.now()

});

document.getElementById("status").innerHTML =
"<span class='success'>Saved ✔</span>";

}catch(err){
console.log(err);
document.getElementById("status").innerHTML =
"<span class='error'>ID Scan Failed</span>";
}

};

</script>

</body>
</html>
