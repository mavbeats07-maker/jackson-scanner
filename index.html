<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JACKSON SMART TECHNOLOGIES PRO SCANNER</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.85)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
color:white;
}

header{
text-align:center;
padding:15px;
background:rgba(0,0,0,0.6);
}

.container{padding:15px;max-width:900px;margin:auto;}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:12px;
margin-top:15px;
backdrop-filter:blur(10px);
}

video{
width:100%;
border-radius:10px;
background:black;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

.success{color:#00ff88;font-weight:bold;}
.error{color:#ff4d4d;font-weight:bold;}
pre{white-space:pre-wrap;}
</style>
</head>

<body>

<header>
<h2>🚔JACKSON SMART TECHNOLOGIES PRO SCANNER</h2>
<p>RUA VISTA EXT 36 Vehicle + ID Smart Scanner</p>
</header>

<div class="container">

<!-- CAMERA -->
<div class="card">
<h3>📷 Live Scanner</h3>

<video id="video" autoplay playsinline muted></video>

<button onclick="scan()">⚡ FAST SCAN (5 SEC)</button>

<p id="status">Initializing camera...</p>
<pre id="output"></pre>
</div>

<!-- SECURITY PANEL -->
<div class="card">
<h3>🛡 Security Access Verification</h3>

<input id="code" placeholder="Enter Access Code">
<button onclick="verify()">VERIFY ACCESS</button>

<p id="verifyResult"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26",
storageBucket: "jackson-smart-technologi-1db26.firebasestorage.app",
messagingSenderId: "400637493049",
appId: "1:400637493049:web:8d349168400988493672e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

/* CAMERA (BACK CAMERA FORCE) */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:{exact:"environment"}}
});
video.srcObject = stream;
await video.play();
document.getElementById("status").innerText="Camera Ready ✔";
}catch(e){
const stream = await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject = stream;
}
}
startCamera();

/* FAST OCR CLEAN */
function clean(text){
return text.toUpperCase().replace(/[^A-Z0-9\s]/g," ");
}

/* SA PLATE DETECTION */
function getPlate(text){
const match = text.match(/\b[A-Z0-9]{2,3}\s?\d{3,6}\s?(GP|MP|EC|FS|NW|NC|WC|LP|ZN|KZN)\b/);
return match ? match[0] : "";
}

/* VIN */
function getVIN(text){
const match = text.match(/\b[A-HJ-NPR-Z0-9]{17}\b/);
return match ? match[0] : "";
}

/* BRAND AI */
function getBrand(text){
const brands=["TOYOTA","BMW","MAZDA","MERCEDES","FORD","VW","VOLKSWAGEN","NISSAN","HYUNDAI","KIA"];
return brands.find(b=>text.includes(b)) || "";
}

/* ID */
function getID(text){
const match = text.match(/\b\d{13}\b/);
return match ? match[0] : "";
}

/* FAST SCAN */
window.scan = async function(){

document.getElementById("status").innerText="Scanning... (5s mode)";

const canvas=document.createElement("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0,canvas.width,canvas.height);

const img=canvas.toDataURL("image/jpeg",0.7);

const res=await Tesseract.recognize(img,"eng");
const text=clean(res.data.text);

/* PARSE */
const data={
vin:getVIN(text),
plate:getPlate(text),
brand:getBrand(text),
id:getID(text),
time:Date.now()
};

document.getElementById("output").innerText=JSON.stringify(data,null,2);

/* SAVE */
await addDoc(collection(db,"vehicleAccessLogs"),data);

document.getElementById("status").innerHTML="<span class='success'>Saved ✔ FAST SCAN DONE</span>";
};

/* SECURITY VERIFY */
window.verify=async function(){

let code=document.getElementById("code").value;

const q=query(collection(db,"visitorCodes"),where("code","==",code));
const snap=await getDocs(q);

if(snap.empty){
document.getElementById("verifyResult").innerHTML="<span class='error'>INVALID CODE</span>";
return;
}

let d=snap.docs[0].data();

if(Date.now()>d.expiry){
document.getElementById("verifyResult").innerHTML="<span class='error'>EXPIRED</span>";
}else{
document.getElementById("verifyResult").innerHTML=
"<span class='success'>ACCESS GRANTED ✔ "+d.visitor+"</span>";
}
};

</script>

</body>
</html>
