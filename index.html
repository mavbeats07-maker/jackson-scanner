<!DOCTYPE html>
<html>
<head>
  <title>AI Car Disc Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
      padding: 15px;
    }

    button, input {
      padding: 10px;
      margin: 10px;
    }

    pre {
      background: black;
      color: #00ff88;
      padding: 15px;
      text-align: left;
      border-radius: 10px;
      overflow-x: auto;
    }

    h2 { color: #00ffd5; }
  </style>
</head>

<body>

<h2>🚗 AI Car Disc Scanner (NO OCR)</h2>

<input type="file" accept="image/*" capture="environment" id="camera">

<br>

<button onclick="scanDisc()">📸 Scan Disc</button>

<pre id="output">Waiting...</pre>

<script>
/* =========================
   FIREBASE SETUP
========================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   AI VISION API (NO OCR)
========================= */
const OPENAI_API_KEY = "YOUR_OPENAI_API_KEY";

/* =========================
   SCAN FUNCTION
========================= */
async function scanDisc() {
  const file = document.getElementById("camera").files[0];
  if (!file) return alert("Take a photo first");

  document.getElementById("output").innerText = "Analyzing AI vision...";

  const base64 = await toBase64(file);

  const response = await fetch("https://api.openai.com/v1/responses", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + OPENAI_API_KEY
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      input: [
        {
          role: "user",
          content: [
            {
              type: "input_text",
              text: `
You are a vehicle disc intelligence system.

Extract ONLY visible data and return STRICT JSON:

{
  "registration_number": "",
  "vehicle_make": "",
  "vehicle_model": "",
  "vin_number": "",
  "expiry_date": "",
  "disc_number": ""
}

Rules:
- No guessing
- If not visible return null
- Output ONLY JSON
              `
            },
            {
              type: "input_image",
              image_base64: base64.split(",")[1]
            }
          ]
        }
      ]
    })
  });

  const data = await response.json();

  let text = data.output?.[0]?.content?.[0]?.text || "{}";

  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch {
    parsed = { raw_output: text };
  }

  document.getElementById("output").innerText =
    JSON.stringify(parsed, null, 2);

  /* =========================
     SAVE TO FIREBASE
  ========================= */
  await db.collection("scans").add({
    result: parsed,
    timestamp: new Date().toISOString()
  });
}

/* =========================
   CONVERT IMAGE TO BASE64
========================= */
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}
</script>

</body>
</html>
