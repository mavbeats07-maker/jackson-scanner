<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JACKSON SMART TECHNOLOGIES PRO SCANNER</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0a2a43;
color:white;
}

header{
text-align:center;
padding:15px;
background:rgba(0,0,0,0.6);
}

.container{padding:12px;max-width:850px;margin:auto;}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

video{
width:100%;
border-radius:12px;
background:black;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#06304d;
color:white;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

.step{color:#00d9ff;font-weight:bold;}

.good{color:#00ff99;font-weight:bold;}
.bad{color:#ff4d4d;font-weight:bold;}

pre{white-space:pre-wrap;}
</style>
</head>

<body>

<header>
<h2>🚗JACKSON SMART TECHNOLOGIES PRO SCANNER</h2>
<p>RUA VISTA EXT36 Boomgate Intelligence System</p>
</header>

<div class="container">

<!-- CAMERA -->
<div class="card">

<h3>📷 Vehicle & ID Scanner</h3>

<video id="video" autoplay playsinline muted></video>

<p class="step" id="stepText">STEP 1: Scan Vehicle Disc</p>

<button onclick="scan()">SCAN</button>

<p id="status">Starting camera...</p>

<pre id="output"></pre>

</div>

<!-- HOUSE NUMBER -->
<div class="card">
<h3>🏠 House Number</h3>
<input id="house" placeholder="Enter house number (e.g. 18A)" />
</div>

<!-- SECURITY PANEL (RESTORED) -->
<div class="card">
<h3>🔐 Security Verification Panel</h3>

<input id="code" placeholder="Enter Access Code" />
<button onclick="verifyCode()">VERIFY ACCESS</button>

<div id="verifyResult"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26",
storageBucket: "jackson-smart-technologi-1db26.firebasestorage.app",
messagingSenderId: "400637493049",
appId: "1:400637493049:web:8d349168400988493672e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

/* CAMERA (ANPR STYLE) */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{ ideal:"environment" },
width:{ ideal:1920 },
height:{ ideal:1080 }
},
audio:false
});

video.srcObject = stream;
await video.play();

document.getElementById("status").innerText = "Camera Ready ✔";

}catch(e){
document.getElementById("status").innerText = "Camera blocked ❌";
}
}

startCamera();

/* CLEANER */
function clean(text){
return text.toUpperCase().replace(/[^A-Z0-9\s]/g," ").replace(/\s+/g," ");
}

/* VEHICLE AI */
function parseVehicle(text){

text = clean(text);

let vin = (text.match(/[A-HJ-NPR-Z0-9]{17}/) || [])[0] || "";

/* SA PLATE + PROVINCE */
let plate = (text.match(/\b[A-Z]{2,3}\s?\d{3,6}\s?(GP|MP|EC|FS|NW|NC|WC|LP|ZN|KZN)\b/) || [])[0] || "";

/* BRAND AI */
const brands = ["TOYOTA","BMW","MAZDA","MERCEDES","FORD","NISSAN","VW","AUDI","KIA","HYUNDAI","HONDA","ISUZU"];
let make = brands.find(b => text.includes(b)) || "";

return {vin, plate, make};
}

/* ID AI */
function parseID(text){

text = clean(text);

let id = (text.match(/\b\d{13}\b/) || [])[0] || "";
let name = (text.match(/\b[A-Z]{3,}\s[A-Z]{3,}\b/) || [])[0] || "";

return {id, name};
}

/* STEP SYSTEM */
let step = 1;
let vehicleData = null;

/* SCAN */
window.scan = async function(){

document.getElementById("status").innerText = "AI Processing...";

const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0);

const image = canvas.toDataURL("image/jpeg",0.95);

const result = await Tesseract.recognize(image,"eng");
const text = result.data.text;

/* STEP 1 */
if(step === 1){

vehicleData = parseVehicle(text);

document.getElementById("output").innerText =
JSON.stringify(vehicleData,null,2);

document.getElementById("stepText").innerText =
"STEP 2: Scan Driver ID";

document.getElementById("status").innerHTML =
"<span class='good'>Vehicle Captured ✔</span>";

step = 2;
return;
}

/* STEP 2 */
let owner = parseID(text);
let house = document.getElementById("house").value;

/* SAVE */
await addDoc(collection(db,"vehicleAccessLogs"),{
vehicle: vehicleData,
owner,
house,
time: Date.now()
});

document.getElementById("output").innerText =
JSON.stringify({vehicleData,owner,house},null,2);

document.getElementById("status").innerHTML =
"<span class='good'>Saved Successfully ✔</span>";

step = 1;
vehicleData = null;

};

/* SECURITY PANEL */
window.verifyCode = async function(){

let code = document.getElementById("code").value;

const q = query(collection(db,"visitorCodes"), where("code","==", code));
const snap = await getDocs(q);

if(snap.empty){
document.getElementById("verifyResult").innerHTML =
"<p class='bad'>INVALID ACCESS ❌</p>";
return;
}

let data = snap.docs[0].data();

if(Date.now() > data.expiry){
document.getElementById("verifyResult").innerHTML =
"<p class='bad'>EXPIRED CODE ❌</p>";
}else{
document.getElementById("verifyResult").innerHTML =
"<p class='good'>ACCESS GRANTED ✔</p>";
}

};

</script>

</body>
</html>
