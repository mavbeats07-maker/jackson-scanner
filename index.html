<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JST Estate Security Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1950&q=80");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
min-height:100vh;
}

header{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.55);
border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
font-size:28px;
letter-spacing:2px;
}

header p{
margin-top:5px;
opacity:0.9;
}

.container{
padding:15px;
max-width:700px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
margin-bottom:15px;
border:1px solid rgba(255,255,255,0.15);
}

video{
width:100%;
border-radius:12px;
background:black;
margin-top:10px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
background:#06304d;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:15px;
}

.success{
color:#00ff99;
font-weight:bold;
margin-top:10px;
}

.error{
color:#ff4d4d;
font-weight:bold;
margin-top:10px;
}

.step{
margin-top:10px;
font-size:15px;
font-weight:bold;
color:#00d9ff;
}

.status-box{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:14px;
}

pre{
white-space:pre-wrap;
font-size:13px;
margin-top:10px;
color:white;
}

footer{
text-align:center;
padding:15px;
font-size:12px;
background:rgba(0,0,0,0.7);
margin-top:20px;
}

</style>
</head>

<body>

<header>

<h1>🚗 JST ESTATE SECURITY</h1>

<p>Rua Vista Ext 36 • Vehicle & Visitor Verification</p>

</header>

<div class="container">

<!-- SCANNER -->
<div class="card">

<h2>📷 Smart Scanner</h2>

<p class="step" id="scanStep">
STEP 1: Scan Vehicle Disc
</p>

<video id="video" autoplay playsinline muted></video>

<button onclick="scanDocument()">
SCAN DOCUMENT
</button>

<div class="status-box">

<p id="scanStatus">
Starting camera...
</p>

</div>

<pre id="scanOutput"></pre>

</div>

<!-- SECURITY PANEL -->
<div class="card">

<h2>🛡 Security Verification</h2>

<input
type="text"
id="verifyCode"
placeholder="Enter Resident Access Code"
>

<button onclick="verifyVisitorCode()">
VERIFY ACCESS
</button>

<div id="verifyResult"></div>

</div>

</div>

<footer>

THIS SYSTEM REMAINS PROPERTY OF JACKSON SMART TECHNOLOGIES (PTY) LTD |
REG 2026/320361/07

</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {

apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",

authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",

projectId: "jackson-smart-technologi-1db26",

storageBucket: "jackson-smart-technologi-1db26.firebasestorage.app",

messagingSenderId: "400637493049",

appId: "1:400637493049:web:8d349168400988493672e8"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   CAMERA START
========================= */

const video = document.getElementById("video");

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment"
},

audio:false

});

video.srcObject = stream;

await video.play();

document.getElementById("scanStatus").innerText =
"Camera Ready ✔";

}catch(err){

document.getElementById("scanStatus").innerText =
"Camera Access Denied ❌";

}

}

startCamera();

/* =========================
   GLOBAL STATE
========================= */

let currentVehicle = null;
let currentStep = 1;

/* =========================
   SOUTH AFRICAN DISC PARSER
========================= */

function parseVehicle(text){

text = text.toUpperCase();

/* VIN */
let vin =
text.match(/\b[A-HJ-NPR-Z0-9]{17}\b/)?.[0] || "";

/* SA PLATE */
let platePatterns = [

/[A-Z]{2,3}\s?[0-9]{3,6}\s?(GP|MP|EC|FS|NW|NC|WC|LP|ZN|KZN)/,

/[A-Z]{2,3}[0-9]{3,6}(GP|MP|EC|FS|NW|NC|WC|LP|ZN|KZN)/,

/[A-Z]{1,3}\s?[0-9]{1,4}\s?[A-Z]{1,3}\s?(GP|MP|EC|FS|NW|NC|WC|LP|ZN|KZN)/

];

let plate = "";

for(let p of platePatterns){

let found = text.match(p);

if(found){

plate = found[0];
break;

}

}

/* VEHICLE BRANDS */
const brands = [

"TOYOTA",
"MAZDA",
"BMW",
"MERCEDES",
"FORD",
"VOLKSWAGEN",
"VW",
"NISSAN",
"HYUNDAI",
"KIA",
"AUDI",
"ISUZU",
"SUZUKI",
"RENAULT",
"HAVAL",
"CHERY",
"MAHINDRA",
"JEEP",
"PEUGEOT",
"CHEVROLET",
"HONDA",
"MITSUBISHI",
"LEXUS",
"LAND ROVER",
"RANGE ROVER",
"MINI",
"FIAT",
"OPEL",
"VOLVO",
"PORSCHE",
"JAGUAR"

];

let make = "";

for(let brand of brands){

if(text.includes(brand)){

make = brand;
break;

}

}

return {

vin: vin.trim(),
plate: plate.trim(),
make: make.trim()

};

}

/* =========================
   ID PARSER
========================= */

function parseOwner(text){

let idNumber =
text.match(/\b\d{13}\b/)?.[0] || "";

let owner =
text.match(/[A-Z][a-z]+\s[A-Z][a-z]+/)?.[0] || "";

return {

idNumber,
owner

};

}

/* =========================
   SCAN SYSTEM
========================= */

window.scanDocument = async function(){

if(!video.videoWidth){

alert("Camera not ready");

return;

}

document.getElementById("scanStatus").innerText =
"Scanning...";

const canvas = document.createElement("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

const image =
canvas.toDataURL("image/jpeg",0.9);

/* OCR */
const result =
await Tesseract.recognize(image,"eng");

const text = result.data.text;

/* =========================
   STEP 1 = DISC
========================= */

if(currentStep === 1){

currentVehicle = parseVehicle(text);

document.getElementById("scanOutput").innerText =

JSON.stringify(currentVehicle,null,2);

document.getElementById("scanStatus").innerHTML =

"Vehicle Disc Captured ✔";

document.getElementById("scanStep").innerText =

"STEP 2: Scan Owner ID";

currentStep = 2;

}

/* =========================
   STEP 2 = OWNER ID
========================= */

else{

let ownerData = parseOwner(text);

/* SAVE FIREBASE */
await addDoc(collection(db,"vehicleAccessLogs"),{

vehicle: currentVehicle,

owner: ownerData,

time: Date.now()

});

document.getElementById("scanOutput").innerText =

JSON.stringify({

vehicle: currentVehicle,
owner: ownerData

},null,2);

document.getElementById("scanStatus").innerHTML =

"Saved Successfully ✔";

document.getElementById("scanStep").innerText =

"STEP 1: Scan Vehicle Disc";

currentStep = 1;

currentVehicle = null;

}

};

/* =========================
   VERIFY RESIDENT CODE
========================= */

window.verifyVisitorCode = async function(){

let code =
document.getElementById("verifyCode").value;

if(!code){

alert("Enter code");

return;

}

const q = query(

collection(db,"visitorCodes"),

where("code","==", code)

);

const snap = await getDocs(q);

if(snap.empty){

document.getElementById("verifyResult").innerHTML =

"<p class='error'>INVALID CODE ❌</p>";

return;

}

let data = snap.docs[0].data();

if(Date.now() > data.expiry){

document.getElementById("verifyResult").innerHTML =

"<p class='error'>ACCESS DENIED — CODE EXPIRED ❌</p>";

}else{

document.getElementById("verifyResult").innerHTML =

`
<p class='success'>
ACCESS GRANTED ✔
<br><br>
Resident: ${data.resident}
<br>
Visitor: ${data.visitor}
</p>
`;

}

};

</script>

</body>
</html>
