<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>JST Security Control System</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");

background-size:cover;
background-position:center;
min-height:100vh;
color:white;
}

.container{
padding:15px;
max-width:950px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.12);
}

.videoWrap{
position:relative;
}

video{
width:100%;
border-radius:12px;
background:black;
}

#scanBox{
position:absolute;
border:3px solid #00ff88;
box-shadow:0 0 20px #00ff88;
border-radius:12px;
pointer-events:none;
left:20%;
top:25%;
width:60%;
height:30%;
transition:0.3s;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#06304d;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

.result{
margin-top:15px;
background:rgba(0,0,0,0.45);
padding:12px;
border-radius:10px;
line-height:1.8;
}

.result span{
color:#00ff88;
font-weight:bold;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff4d4d;
font-weight:bold;
}

.alertMode{
animation:flash 0.7s infinite;
}

@keyframes flash{

0%{
background:#1b0000;
}

50%{
background:#8b0000;
}

100%{
background:#1b0000;
}

}

#panicPanel{
display:none;
border:2px solid red;
}

iframe{
width:100%;
height:260px;
border:none;
border-radius:10px;
margin-top:10px;
}

.stopBtn{
background:#b30000;
}

.step{
color:#00d9ff;
font-weight:bold;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🚗 JST Security Control System</h2>

<!-- PANIC PANEL -->

<div class="card" id="panicPanel">

<h2 style="color:red;">
🚨 LIVE PANIC ALERT
</h2>

<p id="panicText"></p>

<iframe id="panicMap"></iframe>

<button class="stopBtn" onclick="stopAlarm()">
STOP ALARM
</button>

</div>

<!-- SCANNER -->

<div class="card">

<p class="step" id="stepText">
STEP 1 : Scan Vehicle Disc Barcode
</p>

<div class="videoWrap">

<video id="video" autoplay playsinline muted></video>

<div id="scanBox"></div>

</div>

<button onclick="scan()">
SCAN DOCUMENT
</button>

<p id="status">
Starting camera...
</p>

<div class="result" id="output">

Disc Barcode :
<span>-</span><br>

ID Number :
<span>-</span>

</div>

</div>

<!-- SECURITY PANEL -->

<div class="card">

<h3>
🔐 Security Panel
</h3>

<input
id="code"
placeholder="Enter Access Code"
/>

<button onclick="verify()">
VERIFY
</button>

<p id="verifyOut"></p>

</div>

</div>

<!-- AUDIO -->

<audio id="panicSiren" loop>

<source
src="https://actions.google.com/sounds/v1/emergency/police_siren.ogg"
type="audio/ogg"
>

</audio>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* =========================
FIREBASE
========================= */

const firebaseConfig = {

apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",

authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",

projectId: "jackson-smart-technologi-1db26"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* =========================
GLOBAL VARIABLES
========================= */

let activePanicId = null;
let panicMuted = false;

let scanStep = 1;
let vehicleData = {};

/* =========================
CAMERA
========================= */

const video =
document.getElementById("video");

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
}
},

audio:false

});

video.srcObject = stream;

await video.play();

document.getElementById("status").innerHTML =
"<span class='success'>Camera ready ✔</span>";

}catch(err){

console.log(err);

document.getElementById("status").innerHTML =
"<span class='error'>Camera blocked ❌</span>";

}

}

startCamera();

/* =========================
SCAN BOX CONTROL
========================= */

function setScanBox(x,y,w,h){

const box =
document.getElementById("scanBox");

box.style.left =
(x * 100) + "%";

box.style.top =
(y * 100) + "%";

box.style.width =
(w * 100) + "%";

box.style.height =
(h * 100) + "%";

}

/* =========================
PANIC REALTIME
========================= */

const panicAudio =
document.getElementById("panicSiren");

onSnapshot(

collection(db,"panicAlerts"),

(snapshot)=>{

snapshot.docChanges().forEach(change=>{

if(change.type !== "added") return;

const d =
change.doc.data();

const id =
change.doc.id;

/* prevent duplicate */

if(id === activePanicId) return;

activePanicId = id;

panicMuted = false;

/* show panel */

document.getElementById("panicPanel").style.display =
"block";

document.getElementById("panicText").innerHTML =

`

<b style="color:red;font-size:28px;">
🚨 PANIC ALERT ACTIVE
</b>

<br><br>

Latitude:
<b>${d.latitude}</b>

<br><br>

Longitude:
<b>${d.longitude}</b>

<br><br>

Time:
<b>${new Date(d.time).toLocaleString()}</b>

`;

/* map */

document.getElementById("panicMap").src =

`https://maps.google.com/maps?q=${d.latitude},${d.longitude}&z=18&output=embed`;

/* siren */

if(!panicMuted){

panicAudio.currentTime = 0;

panicAudio.play().catch(()=>{});

document.body.classList.add("alertMode");

navigator.vibrate?.([500,200,500,200,1000]);

}

});

}

/* STOP ALARM */

);

window.stopAlarm = function(){

panicMuted = true;

activePanicId = null;

panicAudio.pause();

panicAudio.currentTime = 0;

document.body.classList.remove("alertMode");

document.getElementById("panicPanel").style.display =
"none";

document.getElementById("panicText").innerHTML =
"";

document.getElementById("panicMap").src =
"";

};

/* =========================
SCANNER
========================= */

window.scan = async function(){

const status =
document.getElementById("status");

const output =
document.getElementById("output");

const canvas =
document.createElement("canvas");

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(

video,
0,
0,
canvas.width,
canvas.height

);

/* =========================
STEP 1 BARCODE
========================= */

if(scanStep === 1){

status.innerHTML =
"Scanning vehicle disc barcode...";

/* small box */

setScanBox(0.2,0.3,0.6,0.25);

try{

const reader =
new ZXingBrowser.BrowserMultiFormatReader();

const result =
await reader.decodeFromCanvas(canvas);

if(!result || !result.text){

status.innerHTML =
"<span class='error'>No barcode detected ❌</span>";

return;

}

const barcodeText =
result.text;

vehicleData = {

barcode: barcodeText

};

output.innerHTML =

`

Disc Barcode :
<span>${barcodeText}</span><br>

ID Number :
<span>-</span>

`;

status.innerHTML =
"<span class='success'>Vehicle disc scanned ✔</span>";

scanStep = 2;

document.getElementById("stepText").innerText =
"STEP 2 : Scan ID / Driver License";

return;

}catch(err){

console.log(err);

status.innerHTML =
"<span class='error'>Barcode scan failed ❌</span>";

return;

}

}

/* =========================
STEP 2 OCR ID
========================= */

if(scanStep === 2){

status.innerHTML =
"Scanning ID document...";

/* bigger box */

setScanBox(0.15,0.18,0.7,0.5);

try{

const result =
await Tesseract.recognize(

canvas.toDataURL("image/jpeg",1.0),
"eng"

);

const text =
result.data.text || "";

const idMatch =
text.match(/\d{13}/);

if(!idMatch){

status.innerHTML =
"<span class='error'>ID number not found ❌</span>";

return;

}

const idNumber =
idMatch[0];

output.innerHTML =

`

Disc Barcode :
<span>${vehicleData.barcode}</span><br>

ID Number :
<span>${idNumber}</span>

`;

status.innerHTML =
"<span class='success'>Full scan complete ✔</span>";

scanStep = 1;

vehicleData = {};

document.getElementById("stepText").innerText =
"STEP 1 : Scan Vehicle Disc Barcode";

}catch(err){

console.log(err);

status.innerHTML =
"<span class='error'>OCR scan failed ❌</span>";

}

}

};

/* =========================
VERIFY ACCESS
========================= */

window.verify = async function(){

const code =
document.getElementById("code").value.trim();

const out =
document.getElementById("verifyOut");

if(!code){

out.innerHTML =
"<span class='error'>ENTER ACCESS CODE</span>";

return;

}

try{

const snap =
await getDocs(collection(db,"visitorCodes"));

let found = null;

snap.forEach(docSnap=>{

const data =
docSnap.data();

if(String(data.code).trim() === code){

found = data;

}

});

if(!found){

out.innerHTML =
"<span class='error'>INVALID CODE ❌</span>";

return;

}

if(found.expiry && Date.now() > found.expiry){

out.innerHTML =
"<span class='error'>CODE EXPIRED ❌</span>";

return;

}

out.innerHTML =

`

<span class='success'>
ACCESS GRANTED ✔
</span>

<br><br>

Resident:
<b>${found.resident || "-"}</b>

<br><br>

Visitor:
<b>${found.visitor || "-"}</b>

<br><br>

House:
<b>${found.houseNumber || "-"}</b>

`;

}catch(err){

console.log(err);

out.innerHTML =
"<span class='error'>VERIFY FAILED ❌</span>";

}

};

</script>

</body>
</html>
