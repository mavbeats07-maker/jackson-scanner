<!-- =========================================
JST SECURITY SCANNER + LIVE PANIC RECEIVER
SAVE AS: scanner-system.html
========================================= -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JST Security Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");

background-size:cover;
background-position:center;
min-height:100vh;
color:white;
}

.container{
padding:15px;
max-width:950px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

video{
width:100%;
border-radius:15px;
background:black;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

.result{
margin-top:15px;
background:rgba(0,0,0,0.45);
padding:12px;
border-radius:10px;
line-height:1.8;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff4d4d;
font-weight:bold;
}

iframe{
width:100%;
height:350px;
border:none;
border-radius:12px;
margin-top:15px;
}

body.alertMode{
animation:flash 0.5s infinite;
}

@keyframes flash{
0%{background:#220000;}
50%{background:#880000;}
100%{background:#220000;}
}

</style>

</head>

<body>

<div class="container">

<h2>🚗 JST SECURITY SCANNER</h2>

<!-- PANIC -->
<div
class="card"
id="panicCard"
style="display:none;border:2px solid red;"
>

<h2 style="color:red;">
🚨 LIVE PANIC ALERT
</h2>

<p id="panicText"></p>

<iframe id="panicMap"></iframe>

<button
onclick="stopAlarm()"
style="background:#b30000;"
>
STOP ALARM
</button>

</div>

<!-- SCANNER -->
<div class="card">

<video
id="video"
autoplay
playsinline
muted>
</video>

<button
onclick="scanID()"
id="idBtn"
disabled
>
SCAN ID
</button>

<p id="status">
Starting camera...
</p>

<div class="result" id="output">

Plate : -<br>
Car Make : -<br>
ID Number : -

</div>

</div>

<!-- VERIFY -->
<div class="card">

<h3>🔐 VERIFY ACCESS</h3>

<input
id="code"
placeholder="Enter Access Code"
>

<button onclick="verify()">
VERIFY
</button>

<p id="verifyOut"></p>

</div>

</div>

<!-- SIREN -->
<audio
id="alarm"
loop
preload="auto"
>

<source
src="https://actions.google.com/sounds/v1/emergency/emergency_siren.ogg"
type="audio/ogg"
>

</audio>

<script type="module">

import { BrowserMultiFormatReader }
from "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm";

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",

authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",

projectId: "jackson-smart-technologi-1db26"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const alarm =
document.getElementById("alarm");

/* LIVE PANIC LISTENER */

let lastPanicTime = 0;

onSnapshot(

collection(db,"panicAlerts"),

(snapshot)=>{

snapshot.docChanges().forEach((change)=>{

if(change.type !== "added") return;

const data = change.doc.data();

if(data.status !== "ACTIVE") return;

if(data.time <= lastPanicTime) return;

lastPanicTime = data.time;

/* PLAY SIREN */

alarm.pause();

alarm.currentTime = 0;

alarm.volume = 1;

alarm.play();

/* RED FLASH */

document.body.classList.add("alertMode");

/* SHOW ALERT */

document.getElementById("panicCard").style.display =
"block";

document.getElementById("panicText").innerHTML =

`
🚨 LIVE PANIC RECEIVED<br><br>

Latitude:
${data.latitude}<br>

Longitude:
${data.longitude}<br>

Accuracy:
${Math.round(data.accuracy)} meters
`;

/* MAP */

document.getElementById("panicMap").src =

"https://maps.google.com/maps?q="
+
data.latitude
+
","
+
data.longitude
+
"&z=18&output=embed";

});

}

);

/* STOP ALARM */

window.stopAlarm = function(){

alarm.pause();

alarm.currentTime = 0;

document.body.classList.remove("alertMode");

document.getElementById("panicCard").style.display =
"none";

};

/* CAMERA */

const video =
document.getElementById("video");

const idBtn =
document.getElementById("idBtn");

let vehicleData = {};

let locked = false;

async function startCamera(){

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{exact:"environment"}
},

audio:false

});

video.srcObject = stream;

await video.play();

document.getElementById("status").innerHTML =
"<span class='success'>Camera Ready ✔</span>";

}

startCamera();

/* BARCODE SCAN */

const reader =
new BrowserMultiFormatReader();

async function startScanner(){

const devices =
await BrowserMultiFormatReader.listVideoInputDevices();

const backCam =
devices[0];

reader.decodeFromVideoDevice(

backCam.deviceId,
video,

(result)=>{

if(!result || locked) return;

locked = true;

const raw =
result.text.toUpperCase();

const plate =
raw.match(/[A-Z]{2,3}\d{2,6}(GP|MP|FS|EC|WC|KZN|NW|NC|LP)/);

vehicleData = {
plate:plate ? plate[0] : "",
make:"Detected"
};

document.getElementById("output").innerHTML =

`
Plate :
${vehicleData.plate}<br>

Car Make :
${vehicleData.make}<br>

ID Number :
-
`;

idBtn.disabled = false;

setTimeout(()=>{

locked=false;

},2000);

}

);

}

startScanner();

/* OCR ID */

window.scanID = async function(){

const canvas =
document.createElement("canvas");

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(video,0,0);

const img =
canvas.toDataURL("image/jpeg");

const res =
await Tesseract.recognize(img,"eng");

const text =
res.data.text;

const id =
text.match(/\b\d{13}\b/);

if(!id){

document.getElementById("status").innerHTML =
"<span class='error'>ID NOT FOUND</span>";

return;

}

document.getElementById("output").innerHTML =

`
Plate :
${vehicleData.plate}<br>

Car Make :
${vehicleData.make}<br>

ID Number :
${id[0]}
`;

await addDoc(
collection(db,"vehicleAccessLogs"),
{
vehicle:vehicleData,
owner:{idNumber:id[0]},
time:Date.now()
}
);

};

/* VERIFY CODE */

window.verify = async function(){

const code =
document.getElementById("code").value.trim();

const q = query(
collection(db,"visitorCodes"),
where("code","==",code)
);

const snap =
await getDocs(q);

if(snap.empty){

document.getElementById("verifyOut").innerHTML =
"<span class='error'>INVALID ❌</span>";

return;

}

const d =
snap.docs[0].data();

document.getElementById("verifyOut").innerHTML =

Date.now() > d.expiry

?

"<span class='error'>EXPIRED ❌</span>"

:

`
<span class='success'>
ACCESS GRANTED ✔
</span><br><br>

Resident:
${d.resident}<br>

Visitor:
${d.visitor}<br>

House:
${d.houseNumber}
`;

};

</script>

</body>
</html>
