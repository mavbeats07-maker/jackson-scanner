<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jackson smart technologies pro scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
background-position:center;
min-height:100vh;
color:white;
transition:0.3s;
}

.container{padding:15px;max-width:950px;margin:auto;}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.12);
}

.videoWrap{position:relative;}

video{
width:100%;
border-radius:15px;
background:black;
filter: contrast(1.2) brightness(1.08) saturate(1.15);
}

.overlay{
position:absolute;
top:18%;left:15%;
width:70%;height:45%;
border:3px solid #00ff88;
border-radius:12px;
box-shadow:0 0 25px #00ff88;
animation:pulse 1.2s infinite;
pointer-events:none;
}

.scanLine{
position:absolute;
left:15%;
width:70%;
height:3px;
background:#00ff88;
top:20%;
box-shadow:0 0 15px #00ff88;
animation:scanMove 2s linear infinite;
pointer-events:none;
}

@keyframes pulse{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}
@keyframes scanMove{0%{top:20%}50%{top:58%}100%{top:20%}}

button{width:100%;padding:14px;border:none;border-radius:10px;background:#0a2a43;color:white;font-weight:bold;margin-top:10px;cursor:pointer;font-size:15px;}
button:hover{background:#06304d;}

input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;outline:none;}

.step{color:#00d9ff;font-weight:bold;margin-bottom:10px;}
.success{color:#00ff88;font-weight:bold;}
.error{color:#ff4d4d;font-weight:bold;}

.result{margin-top:15px;background:rgba(0,0,0,0.45);padding:12px;border-radius:10px;line-height:1.8;}
.result span{color:#00ff88;font-weight:bold;}

.alertMode{animation:flashRed 0.7s infinite;}
@keyframes flashRed{
0%{background-color:#1b0000;}
50%{background-color:#8b0000;}
100%{background-color:#1b0000;}
}

#panicPanel{display:none;border:2px solid red;}

#panicPanel iframe{
width:100%;
height:300px;
border:none;
border-radius:12px;
margin-top:15px;
}

.stopBtn{background:#b30000;font-size:18px;}
</style>

</head>

<body>

<div class="container">

<h2>🚗 Jackson smart technologies pro scanner</h2>

<!-- PANIC PANEL -->
<div class="card" id="panicPanel">
<h2 style="color:red;">🚨 LIVE PANIC ALERT</h2>
<p id="panicText"></p>
<iframe id="panicMap"></iframe>
<button class="stopBtn" onclick="stopAlarm()">STOP ALARM</button>
</div>

<!-- SCANNER -->
<div class="card">

<p class="step" id="stepText">STEP 1 : Scan Vehicle Disc</p>

<div class="videoWrap">
<video id="video" autoplay playsinline muted></video>
<div class="overlay"></div>
<div class="scanLine"></div>
</div>

<button onclick="scan()">SCAN DOCUMENT</button>

<p id="status">Starting camera...</p>

<div class="result" id="output">
Plate : <span>-</span><br>
Car Make : <span>-</span><br>
ID Number : <span>-</span>
</div>

</div>

<!-- SECURITY -->
<div class="card">
<h3>🔐 Security Panel</h3>
<input id="code" placeholder="Enter Access Code">
<button onclick="verify()">VERIFY ACCESS</button>
<p id="verifyOut"></p>
</div>

</div>

<!-- AUDIO -->
<audio id="panicSiren" loop preload="auto">
<source src="https://actions.google.com/sounds/v1/emergency/police_siren.ogg">
</audio>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore, collection, addDoc, query, where,
getDocs, onSnapshot, orderBy, limit
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= CAMERA FIX (IMPORTANT) ================= */

const video = document.getElementById("video");

async function startCamera() {
  try {
    document.getElementById("status").innerHTML =
      "Requesting camera permission...";

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" }
      },
      audio: false
    });

    video.srcObject = stream;

    // IMPORTANT FIX: wait for metadata BEFORE play
    await new Promise((resolve) => {
      video.onloadedmetadata = () => resolve();
    });

    await video.play();

    document.getElementById("status").innerHTML =
      "<span class='success'>Camera Started ✔ (Back Camera Active)</span>";

  } catch (err) {
    console.log("CAMERA ERROR:", err);

    document.getElementById("status").innerHTML =
      "<span class='error'>Camera blocked ❌ Please allow camera access</span>";
  }
}

/* 🔥 FORCE USER GESTURE SUPPORT (IMPORTANT FIX) */
document.addEventListener("click", () => {
  if (!video.srcObject) {
    startCamera();
  }
});

startCamera();
startCamera();

/* ================= GLOBAL STATE ================= */

let step = 1;
let vehicleData = {};

/* ================= HELPERS ================= */

function clean(t){ return (t||"").replace(/\s+/g," ").trim().toUpperCase(); }
function getID(t){ const m=t.match(/\b\d{13}\b/); return m?m[0]:null; }

async function scanOCR(img){
return await Tesseract.recognize(img,"eng");
}

/* ================= SCAN ================= */

window.scan = async function(){

const canvas=document.createElement("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

if(step===1){

document.getElementById("status").innerHTML="Scanning disc...";

try{

const codeReader=new ZXingBrowser.BrowserMultiFormatReader();
const res=await codeReader.decodeOnceFromVideoElement(video);

const text=clean(res.text);

/* SIMPLE EXTRACTION */
vehicleData={raw:text};

document.getElementById("output").innerHTML=`
Plate:<span>-</span><br>
Car Make:<span>-</span><br>
ID Number:<span>-</span>`;

document.getElementById("status").innerHTML=
"<span class='success'>Disc Captured ✔</span>";

step=2;
document.getElementById("stepText").innerText="STEP 2 : Scan South African ID";

}catch(e){
document.getElementById("status").innerHTML=
"<span class='error'>No barcode detected ❌</span>";
}

return;
}

/* STEP 2 */

document.getElementById("status").innerHTML="Scanning ID...";

const ocr=await scanOCR(canvas.toDataURL("image/jpeg"));
const id=getID(ocr.data.text);

if(!id){
document.getElementById("status").innerHTML=
"<span class='error'>Invalid ID ❌</span>";
return;
}

await addDoc(collection(db,"vehicleAccessLogs"),{
vehicle:vehicleData,
owner:{idNumber:id},
time:Date.now()
});

document.getElementById("output").innerHTML=`
Plate:<span>-</span><br>
Car Make:<span>-</span><br>
ID Number:<span>${id}</span>`;

document.getElementById("status").innerHTML=
"<span class='success'>Saved ✔</span>";

step=1;

};

/* ================= VERIFY ================= */

window.verify = async function(){
const code=document.getElementById("code").value;
const q=query(collection(db,"visitorCodes"),where("code","==",code));
const snap=await getDocs(q);

if(snap.empty){
document.getElementById("verifyOut").innerHTML="<span class='error'>INVALID</span>";
return;
}

document.getElementById("verifyOut").innerHTML=
"<span class='success'>ACCESS GRANTED</span>";
};

/* ================= PANIC SYSTEM (UNCHANGED SIMPLIFIED) ================= */

window.stopAlarm=function(){
document.getElementById("panicPanel").style.display="none";
};

</script>

</body>
</html>
