<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST SCANNER</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
color:white;
text-align:center;
}

.card{padding:15px;}

.alert{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:red;
display:none;
font-size:30px;
padding-top:120px;
}

button{padding:10px;width:100%;}
</style>
</head>

<body>

<h2>SECURITY SCANNER</h2>

<input id="code" placeholder="Enter Code">
<button onclick="verify()">VERIFY</button>
<p id="msg"></p>

<div class="alert" id="alert">
🚨 PANIC ALERT
<br>
<a id="map" target="_blank" style="color:white;">VIEW LOCATION</a>
</div>

<audio id="siren">
<source src="https://actions.google.com/sounds/v1/alarms/police_siren.ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
query,
where,
getDocs,
onSnapshot,
orderBy,
limit
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);

/* VERIFY */
window.verify = async function(){
const q=query(collection(db,"visitorCodes"),
where("code","==",code.value));

const s=await getDocs(q);
msg.innerHTML=s.empty?"❌ Invalid":"✔ Valid";
};

/* LIVE PANIC LISTENER */
const siren=document.getElementById("siren");

const q=query(collection(db,"panicAlerts"),orderBy("time","desc"),limit(1));

onSnapshot(q,(snap)=>{

snap.docChanges().forEach(change=>{

if(change.type==="added"){

const d=change.doc.data();

alert.style.display="block";

siren.loop=true;
siren.play().catch(()=>{});

map.href=`https://maps.google.com/?q=${d.lat},${d.lng}`;

}

});

});

</script>

</body>
</html>
