<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jackson smart technologies pro scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");

background-size:cover;
background-position:center;
min-height:100vh;
color:white;
transition:0.3s;
}

.container{
padding:15px;
max-width:950px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.12);
}

.videoWrap{
position:relative;
}

video{
width:100%;
border-radius:15px;
background:black;
filter: contrast(1.2) brightness(1.08) saturate(1.15);
}

.overlay{
position:absolute;
top:18%;
left:15%;
width:70%;
height:45%;
border:3px solid #00ff88;
border-radius:12px;
box-shadow:0 0 25px #00ff88;
animation:pulse 1.2s infinite;
pointer-events:none;
}

.scanLine{
position:absolute;
left:15%;
width:70%;
height:3px;
background:#00ff88;
top:20%;
box-shadow:0 0 15px #00ff88;
animation:scanMove 2s linear infinite;
pointer-events:none;
}

@keyframes pulse{

0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}

}

@keyframes scanMove{

0%{top:20%}
50%{top:58%}
100%{top:20%}

}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#06304d;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

.step{
color:#00d9ff;
font-weight:bold;
margin-bottom:10px;
}

.success{
color:#00ff88;
font-weight:bold;
}

.error{
color:#ff4d4d;
font-weight:bold;
}

.result{
margin-top:15px;
background:rgba(0,0,0,0.45);
padding:12px;
border-radius:10px;
line-height:1.8;
}

.result span{
color:#00ff88;
font-weight:bold;
}

/* =========================
PANIC ALERT SYSTEM
========================= */

.alertMode{

animation:flashRed 0.7s infinite;

}

@keyframes flashRed{

0%{
background-color:#1b0000;
}

50%{
background-color:#8b0000;
}

100%{
background-color:#1b0000;
}

}

#panicPanel{

display:none;
border:2px solid red;

}

#panicPanel iframe{

width:100%;
height:300px;
border:none;
border-radius:12px;
margin-top:15px;

}

.stopBtn{

background:#b30000;
font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<h2>
🚗 Jackson smart technologies pro scanner
</h2>

<!-- =========================
LIVE PANIC ALERT PANEL
========================= -->

<div class="card" id="panicPanel">

<h2 style="color:red;">
🚨 LIVE PANIC ALERT
</h2>

<p id="panicText"></p>

<iframe id="panicMap"></iframe>

<button
class="stopBtn"
onclick="stopAlarm()"
>
STOP ALARM
</button>

</div>

<!-- =========================
SCANNER
========================= -->

<div class="card">

<p class="step" id="stepText">
STEP 1 : Scan Vehicle Disc
</p>

<div class="videoWrap">

<video
id="video"
autoplay
playsinline
muted>
</video>

<div class="overlay"></div>

<div class="scanLine"></div>

</div>

<button onclick="scan()">
SCAN DOCUMENT
</button>

<p id="status" style="margin-top:10px;">
Starting camera...
</p>

<div class="result" id="output">

Plate :
<span>-</span><br>

Car Make :
<span>-</span><br>

ID Number :
<span>-</span>

</div>

</div>

<!-- =========================
SECURITY PANEL
========================= -->

<div class="card">

<h3>
🔐 Security Panel
</h3>

<input
id="code"
placeholder="Enter Access Code"
>

<button onclick="verify()">
VERIFY ACCESS
</button>

<p id="verifyOut"></p>

</div>

</div>

<!-- =========================
LOUD POLICE SIREN
========================= -->

<audio
id="panicSiren"
loop
preload="auto"
>

<source
src="https://actions.google.com/sounds/v1/emergency/police_siren.ogg"
type="audio/ogg"
>

</audio>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
query,
where,
getDocs,
onSnapshot,
orderBy,
limit

}

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* =========================
FIREBASE
========================= */

const firebaseConfig = {

apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",

authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",

projectId: "jackson-smart-technologi-1db26"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* =========================
LIVE PANIC ALERT LISTENER
========================= */

const panicAudio =
document.getElementById("panicSiren");

panicAudio.volume = 1;

let lastPanicTime = 0;

/* CUSTOM EMERGENCY TONE */

function playEmergencyTone(){

const AudioContext =
window.AudioContext ||
window.webkitAudioContext;

const ctx =
new AudioContext();

/* SIREN WAVES */

const osc1 = ctx.createOscillator();
const osc2 = ctx.createOscillator();

const gain1 = ctx.createGain();
const gain2 = ctx.createGain();

osc1.connect(gain1);
gain1.connect(ctx.destination);

osc2.connect(gain2);
gain2.connect(ctx.destination);

osc1.type = "sawtooth";
osc2.type = "square";

gain1.gain.value = 0.4;
gain2.gain.value = 0.3;

osc1.frequency.setValueAtTime(
700,
ctx.currentTime
);

osc2.frequency.setValueAtTime(
900,
ctx.currentTime
);

/* REAL POLICE EFFECT */

osc1.frequency.linearRampToValueAtTime(
1200,
ctx.currentTime + 0.5
);

osc2.frequency.linearRampToValueAtTime(
1400,
ctx.currentTime + 0.5
);

osc1.frequency.linearRampToValueAtTime(
700,
ctx.currentTime + 1
);

osc2.frequency.linearRampToValueAtTime(
900,
ctx.currentTime + 1
);

osc1.start();
osc2.start();

/* STOP AFTER 8 SECONDS */

setTimeout(()=>{

osc1.stop();
osc2.stop();

},8000);

}

/* FIREBASE PANIC LISTENER */

const panicQuery = query(

collection(db,"panicAlerts"),
orderBy("time","desc"),
limit(1)

);

onSnapshot(

panicQuery,

(snapshot)=>{

snapshot.forEach(async(doc)=>{

const data = doc.data();

/* IGNORE OLD ALERTS */

if(data.time <= lastPanicTime){
return;
}

lastPanicTime = data.time;

/* =========================
PLAY ALL ALARMS INSTANTLY
========================= */

try{

panicAudio.pause();

panicAudio.currentTime = 0;

await panicAudio.play();

}catch(err){

console.log("Audio autoplay blocked");

}

/* CUSTOM TONE BACKUP */

playEmergencyTone();

/* SCREEN FLASH */

document.body.classList.add("alertMode");

/* FULLSCREEN */

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen();

}

/* VIBRATION */

if(navigator.vibrate){

navigator.vibrate([500,200,500,200,1000]);

}

/* SHOW ALERT PANEL */

document.getElementById("panicPanel").style.display =
"block";

/* SHOW DATA */

document.getElementById("panicText").innerHTML =

`

<b style="
font-size:34px;
color:red;
">
🚨 POLICE EMERGENCY ALERT
</b>

<br><br>

Latitude:
<b>${data.latitude}</b>

<br><br>

Longitude:
<b>${data.longitude}</b>

<br><br>

Accuracy:
<b>${Math.round(data.accuracy)}m</b>

<br><br>

Time:
<b>${new Date(data.time).toLocaleString()}</b>

`;

/* MAP */

document.getElementById("panicMap").src =

"https://maps.google.com/maps?q="
+
data.latitude
+
","
+
data.longitude
+
"&z=18&output=embed";

});

}

);


/* =========================
STOP ALARM
========================= */

window.stopAlarm = function(){

panicAudio.pause();

panicAudio.currentTime = 0;

document.body.classList.remove("alertMode");

document.getElementById("panicPanel").style.display =
"none";

};
/* =========================
READ PDF417 BARCODE
========================= */

async function decodeBarcodeFromCanvas(canvas){

try{

const codeReader =
new ZXingBrowser.BrowserMultiFormatReader();

const result =
await codeReader.decodeFromCanvas(canvas);

return result.text || "";

}catch(err){

return "";

}

}

/* =========================
MAIN SCAN
========================= */

window.scan = async function(){

document.getElementById("status").innerHTML =
"Scanning...";

const canvas =
document.createElement("canvas");

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext("2d");

/* FULL VIDEO FRAME */

ctx.drawImage(

video,

0,
0,

canvas.width,
canvas.height

);

/* =========================
STEP 1 VEHICLE DISC
========================= */

if(step === 1){

document.getElementById("status").innerHTML =
"Reading vehicle disc barcode...";

/* TRY BARCODE FIRST */

let barcodeData =
await decodeBarcodeFromCanvas(canvas);

/* OCR BACKUP */

let ocrText = "";

if(!barcodeData){

const result =
await scanOCR(
canvas.toDataURL(
"image/jpeg",
1.0
)
);

ocrText =
result.data.text || "";

}

/* FINAL TEXT */

const finalText =
clean(
barcodeData || ocrText
);

console.log(finalText);

/* =========================
EXTRACT VEHICLE DATA
========================= */

let plate = "";
let make = "";
let vin = "";
let engine = "";
let discNumber = "";
let licenceNumber = "";

/* NUMBER PLATE */

const platePatterns = [

/\b[A-Z]{2,3}\d{2,6}[A-Z]{0,2}\b/g,
/\b[A-Z]{1,3}\s?\d{2,6}\s?[A-Z]{0,3}\b/g,
/\b\d{2,6}[A-Z]{2,3}\b/g

];

for(const pattern of platePatterns){

const match =
finalText.match(pattern);

if(match){

plate =
match[0]
.replace(/\s/g,"")
.trim();

break;

}

}

/* VIN */

const vinMatch =
finalText.match(
/\b[A-HJ-NPR-Z0-9]{17}\b/
);

if(vinMatch){

vin = vinMatch[0];

}

/* DISC NUMBER */

const discMatch =
finalText.match(
/\b\d{8,12}\b/
);

if(discMatch){

discNumber =
discMatch[0];

}

/* LICENCE NUMBER */

const licenceMatch =
finalText.match(
/\b[LN0-9]{6,15}\b/
);

if(licenceMatch){

licenceNumber =
licenceMatch[0];

}

/* ENGINE */

const engineMatch =
finalText.match(
/\b[A-Z0-9]{5,15}\b/
);

if(engineMatch){

engine =
engineMatch[0];

}

/* CAR MAKE */

const brands = [

"TOYOTA",
"VOLKSWAGEN",
"VW",
"BMW",
"MERCEDES",
"FORD",
"NISSAN",
"HYUNDAI",
"KIA",
"AUDI",
"ISUZU",
"HONDA",
"CHEVROLET",
"MITSUBISHI",
"LEXUS",
"VOLVO",
"SUZUKI",
"RENAULT",
"MAZDA",
"HAVAL",
"MAHINDRA"

];

for(let b of brands){

if(finalText.includes(b)){

make = b;
break;

}

}

/* VALIDATION */

if(!plate && !vin){

document.getElementById("status").innerHTML =
"<span class='error'>Vehicle Disc Not Detected ❌</span>";

return;

}

/* SAVE TEMP VEHICLE DATA */

vehicleData = {

plate,
make,
vin,
engine,
discNumber,
licenceNumber,
rawBarcodeData: finalText

};

/* SHOW RESULTS */

document.getElementById("output").innerHTML =

`

Plate :
<span>${plate || "-"}</span><br>

Car Make :
<span>${make || "-"}</span><br>

VIN :
<span>${vin || "-"}</span><br>

Disc Number :
<span>${discNumber || "-"}</span><br>

Licence Number :
<span>${licenceNumber || "-"}</span><br>

Engine :
<span>${engine || "-"}</span><br>

ID Number :
<span>-</span>

`;

/* SUCCESS */

document.getElementById("status").innerHTML =
"<span class='success'>Vehicle Disc Captured ✔</span>";

document.getElementById("stepText").innerText =
"STEP 2 : Scan South African ID";

step = 2;

return;

}

/* =========================
STEP 2 ID OCR
========================= */

document.getElementById("status").innerHTML =
"Reading South African ID...";

const result =
await scanOCR(
canvas.toDataURL(
"image/jpeg",
1.0
)
);

const text =
result.data.text;

const idNumber =
getID(text);

if(!idNumber){

document.getElementById("status").innerHTML =
"<span class='error'>Invalid ID Scan ❌</span>";

return;

}

/* =========================
SAVE TO FIREBASE
========================= */

await addDoc(

collection(db,"vehicleAccessLogs"),

{

vehicle:{

plate:
vehicleData.plate || "",

make:
vehicleData.make || "",

vin:
vehicleData.vin || "",

engine:
vehicleData.engine || "",

discNumber:
vehicleData.discNumber || "",

licenceNumber:
vehicleData.licenceNumber || "",

rawBarcodeData:
vehicleData.rawBarcodeData || ""

},

owner:{

idNumber:idNumber

},

time:Date.now()

}

);

/* FINAL OUTPUT */

document.getElementById("output").innerHTML =

`

Plate :
<span>${vehicleData.plate || "-"}</span><br>

Car Make :
<span>${vehicleData.make || "-"}</span><br>

VIN :
<span>${vehicleData.vin || "-"}</span><br>

Disc Number :
<span>${vehicleData.discNumber || "-"}</span><br>

Licence Number :
<span>${vehicleData.licenceNumber || "-"}</span><br>

Engine :
<span>${vehicleData.engine || "-"}</span><br>

ID Number :
<span>${idNumber}</span>

`;

/* SUCCESS */

document.getElementById("status").innerHTML =
"<span class='success'>Saved Successfully ✔</span>";

step = 1;

vehicleData = {};

document.getElementById("stepText").innerText =
"STEP 1 : Scan Vehicle Disc";

};
/* =========================
VERIFY ACCESS
========================= */

window.verify = async function(){

const code =
document.getElementById("code").value.trim();

if(!code){

document.getElementById("verifyOut").innerHTML =
"<span class='error'>Enter Code</span>";

return;

}

const q = query(

collection(db,"visitorCodes"),
where("code","==",code)

);

const snap =
await getDocs(q);

if(snap.empty){

document.getElementById("verifyOut").innerHTML =
"<span class='error'>INVALID CODE ❌</span>";

return;

}

const d =
snap.docs[0].data();

if(Date.now() > d.expiry){

document.getElementById("verifyOut").innerHTML =
"<span class='error'>CODE EXPIRED ❌</span>";

}else{

document.getElementById("verifyOut").innerHTML =

`

<span class='success'>
ACCESS GRANTED ✔
</span>

<br><br>

Resident:
<b>${d.resident}</b>

<br><br>

Visitor:
<b>${d.visitor}</b>

<br><br>

House:
<b>${d.houseNumber}</b>

`;

}

};

</script>

</body>
</html>
