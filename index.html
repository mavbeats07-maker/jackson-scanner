<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackson Smart Scanner PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
color:white;
}

.container{padding:15px;max-width:900px;margin:auto;}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:14px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

video{width:100%;border-radius:12px;background:black;}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a2a43;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

.step{color:#00d9ff;font-weight:bold;}

.success{color:#00ff88}
.error{color:#ff4d4d}

pre{white-space:pre-wrap;font-size:13px;}
</style>
</head>

<body>

<div class="container">

<h2>🚗 jsckson smart tech PRO ANPR + ID Scanner for rua vista ext36</h2>

<div class="card">
<p class="step" id="stepText">STEP 1: Scan Vehicle Disc</p>

<video id="video" autoplay playsinline muted></video>

<button onclick="scanDoc()">SCAN DOCUMENT</button>

<p id="status">Starting camera...</p>

<pre id="output"></pre>
</div>

<div class="card">
<h3>🔐 Security Panel</h3>
<input id="code" placeholder="Enter Access Code">
<button onclick="verify()">VERIFY CODE</button>
<p id="verifyOut"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

let step = 1;
let vehicleData = null;

/* CAMERA */
async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:false
});
video.srcObject = stream;
await video.play();
document.getElementById("status").innerText = "Camera Ready ✔";
}
startCamera();

/* FAST OCR CLEAN */
function clean(t){
return t.toUpperCase()
.replace(/[^A-Z0-9\s]/g," ")
.replace(/\s+/g," ")
.trim();
}

/* VEHICLE PARSER (FIXED) */
function parseVehicle(text){

let t = clean(text);

/* VIN */
let vin = (t.match(/\b[A-HJ-NPR-Z0-9]{17}\b/) || [])[0] || "";

/* SA PLATE FIX (STRICT ONLY REAL PLATES) */
let plate = (t.match(/\b([A-Z]{2,3}\s?\d{3,6}\s?(GP|MP|EC|ZN|KZN|WC|FS|NW|LP|NC))\b/) || [])[0] || "";

/* MAKE ONLY */
const brands = [
"TOYOTA","MAZDA","BMW","MERCEDES","FORD","VW",
"VOLKSWAGEN","NISSAN","HYUNDAI","KIA","AUDI",
"ISUZU","SUZUKI","RENAULT","HONDA","CHEVROLET",
"MITSUBISHI","LEXUS","JEEP","VOLVO","PORSCHE",
"JAGUAR","LAND ROVER"
];

let make = "";
for(let b of brands){
if(t.includes(b)){
make = b;
break;
}
}

return {vin, plate, make};
}

/* ID PARSER (FIXED STRICT) */
function parseID(text){

let t = clean(text);

/* ONLY VALID SA ID */
let idNumber = (t.match(/\b\d{13}\b/) || [])[0] || "";

return {idNumber};
}

/* SCAN (OPTIMIZED FAST) */
window.scanDoc = async function(){

document.getElementById("status").innerText = "Scanning...";

const canvas = document.createElement("canvas");

/* SPEED BOOST */
canvas.width = video.videoWidth / 2;
canvas.height = video.videoHeight / 2;

const ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0,canvas.width,canvas.height);

const img = canvas.toDataURL("image/jpeg",0.6);

/* FAST OCR MODE */
const res = await Tesseract.recognize(img,"eng",{
logger:()=>{}
});

let text = res.data.text;

/* STEP 1 */
if(step === 1){

vehicleData = parseVehicle(text);

document.getElementById("output").innerText =
JSON.stringify(vehicleData,null,2);

document.getElementById("stepText").innerText =
"STEP 2: Scan ID Document";

document.getElementById("status").innerHTML =
"<span class='success'>Vehicle Captured ✔</span>";

step = 2;

/* STEP 2 */
}else{

let owner = parseID(text);

/* FIRESTORE SAVE (STRUCTURED FIXED) */
await addDoc(collection(db,"vehicleAccessLogs"),{

vin: vehicleData.vin,
plate: vehicleData.plate,
carMake: vehicleData.make,

idNumber: owner.idNumber,

time: Date.now()

});

document.getElementById("output").innerText =
JSON.stringify({vehicleData,owner},null,2);

document.getElementById("status").innerHTML =
"<span class='success'>Saved Successfully ✔</span>";

step = 1;
vehicleData = null;

document.getElementById("stepText").innerText =
"STEP 1: Scan Vehicle Disc";
}
};

/* SECURITY PANEL */
window.verify = async function(){

let code = document.getElementById("code").value;

const q = query(collection(db,"visitorCodes"),where("code","==",code));
const snap = await getDocs(q);

if(snap.empty){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>INVALID CODE ❌</span>";
return;
}

let d = snap.docs[0].data();

if(Date.now() > d.expiry){
document.getElementById("verifyOut").innerHTML =
"<span class='error'>EXPIRED CODE ❌</span>";
}else{
document.getElementById("verifyOut").innerHTML =
"<span class='success'>ACCESS GRANTED ✔</span>";
}
};

</script>

</body>
</html>
