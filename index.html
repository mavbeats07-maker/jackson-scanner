<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JACKSON SMART TECHNOLOGIES PRO SCANNER</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0a2a43;
color:white;
}

header{
text-align:center;
padding:15px;
background:rgba(0,0,0,0.6);
}

.container{padding:12px;max-width:800px;margin:auto;}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

video{
width:100%;
border-radius:12px;
background:black;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#06304d;
color:white;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

.step{color:#00d9ff;font-weight:bold;}
.success{color:#00ff99;font-weight:bold;}
.error{color:#ff4d4d;font-weight:bold;}
pre{white-space:pre-wrap;}
</style>
</head>

<body>

<header>
<h2>🚗 JACKSON PRO SCANNER</h2>
<p>RUA VISTA EXT 36 Advanced Vehicle + ID Recognition Engine</p>
</header>

<div class="container">

<div class="card">

<h3>📷 Live AI Camera</h3>

<video id="video" autoplay playsinline muted></video>

<p class="step" id="stepText">STEP 1: Scan Vehicle Disc</p>

<button onclick="scanDoc()">SCAN</button>

<p id="status">Starting AI engine...</p>

<pre id="output"></pre>

</div>

<div class="card">

<h3>🏠 House Number</h3>
<input id="house" placeholder="Enter house number (e.g. 12B)" />

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",
authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",
projectId: "jackson-smart-technologi-1db26",
storageBucket: "jackson-smart-technologi-1db26.firebasestorage.app",
messagingSenderId: "400637493049",
appId: "1:400637493049:web:8d349168400988493672e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const video = document.getElementById("video");

/* CAMERA (PRO BACK CAMERA LOCK) */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{ ideal:"environment" },
width:{ ideal:1920 },
height:{ ideal:1080 }
},
audio:false
});

video.srcObject = stream;
await video.play();

document.getElementById("status").innerText = "AI Camera Ready ✔";

}catch(e){
document.getElementById("status").innerText = "Camera blocked ❌";
}
}

startCamera();

/* =========================
   AI IMAGE ENHANCEMENT (SIMULATED)
========================= */
function enhanceImage(canvas){
const ctx = canvas.getContext("2d");

/* increase contrast / sharpness simulation */
ctx.filter = "contrast(140%) brightness(110%)";
ctx.drawImage(canvas,0,0);

return canvas;
}

/* =========================
   SMART AI PARSER
========================= */
function clean(text){
return text.toUpperCase()
.replace(/[^A-Z0-9\s]/g," ")
.replace(/\s+/g," ")
.trim();
}

function parseVehicleAI(text){

text = clean(text);

/* VIN */
let vin = (text.match(/[A-HJ-NPR-Z0-9]{17}/) || [])[0] || "";

/* PLATE (SA PROVINCES) */
let plate = (text.match(/\b[A-Z]{2,3}\s?\d{3,6}\s?(GP|MP|EC|FS|NW|NC|WC|LP|ZN|KZN)\b/) || [])[0] || "";

/* BRAND AI MAP */
const brands = [
"TOYOTA","BMW","MAZDA","MERCEDES","FORD","NISSAN","VW",
"AUDI","KIA","HYUNDAI","HONDA","ISUZU","VOLVO","RENAULT",
"CHEVROLET","JEEP","LAND ROVER"
];

let make = brands.find(b => text.includes(b)) || "";

return { vin, plate, make };
}

function parseIDAI(text){

text = clean(text);

/* ID */
let id = (text.match(/\b\d{13}\b/) || [])[0] || "";

/* NAME (improved heuristic) */
let name = (text.match(/\b[A-Z]{3,}\s[A-Z]{3,}\b/) || [])[0] || "";

return { id, name };
}

/* STEP ENGINE */
let step = 1;
let vehicle = null;

/* =========================
   SCAN FUNCTION
========================= */
window.scanDoc = async function(){

document.getElementById("status").innerText = "AI Scanning...";

const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0);

enhanceImage(canvas);

const image = canvas.toDataURL("image/jpeg",0.95);

const result = await Tesseract.recognize(image,"eng");
const text = result.data.text;

/* STEP 1 VEHICLE */
if(step === 1){

vehicle = parseVehicleAI(text);

document.getElementById("output").innerText =
JSON.stringify(vehicle,null,2);

document.getElementById("stepText").innerText =
"STEP 2: Scan ID Document";

document.getElementById("status").innerHTML =
"<span class='success'>Vehicle captured ✔</span>";

step = 2;
return;
}

/* STEP 2 ID */
let owner = parseIDAI(text);
let house = document.getElementById("house").value;

/* SAVE */
await addDoc(collection(db,"vehicleAccessLogs"),{

vehicle,
owner,
house,
time: Date.now()

});

document.getElementById("output").innerText =
JSON.stringify({vehicle,owner,house},null,2);

document.getElementById("status").innerHTML =
"<span class='success'>Saved to AI System ✔</span>";

document.getElementById("stepText").innerText =
"STEP 1: Scan Vehicle Disc";

step = 1;
vehicle = null;

};

</script>

</body>
</html>
