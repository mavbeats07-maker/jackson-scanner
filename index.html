<!-- =========================
JST RESIDENT ACCESS SYSTEM
========================= -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JST Resident Access System</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:
linear-gradient(rgba(10,42,67,0.92),rgba(10,42,67,0.92)),
url("https://images.unsplash.com/photo-1518770660439-4636190af475");

background-size:cover;
background-position:center;
min-height:100vh;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:16px;
margin-bottom:20px;
color:black;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input,
select,
button{
width:100%;
padding:13px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#0a2a43;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#06304d;
}

.success{
color:green;
font-weight:bold;
}

.error{
color:red;
font-weight:bold;
}

.code-box{
background:#0a2a43;
color:white;
padding:18px;
border-radius:12px;
text-align:center;
font-size:28px;
font-weight:bold;
margin-top:15px;
letter-spacing:3px;
}

.panicBtn{
background:#b30000;
font-size:24px;
padding:22px;
animation:pulse 1s infinite;
}

iframe{
width:100%;
height:350px;
border:none;
border-radius:12px;
margin-top:15px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.03);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="auth">

<h2>Resident Login</h2>

<input id="username" placeholder="Username">

<input
id="password"
type="password"
placeholder="Password"
>

<button onclick="login()">
LOGIN
</button>

<hr>

<h3>Create Resident Account</h3>

<input
id="newUsername"
placeholder="Complex Username"
>

<input
id="newHouse"
placeholder="House Number"
>

<input
id="newPassword"
type="password"
placeholder="Strong Password"
>

<button onclick="createAccount()">
CREATE ACCOUNT
</button>

<div id="authMsg"></div>

</div>

<!-- APP -->
<div
id="app"
style="display:none;"
>

<!-- VISITOR -->
<div class="card">

<button onclick="logout()">
LOGOUT
</button>

<h2>Generate Visitor Access</h2>

<input
id="residentName"
placeholder="Resident Name"
>

<input
id="houseNumber"
placeholder="House Number"
>

<input
id="visitorName"
placeholder="Visitor Name"
>

<select id="hours">

<option value="1">1 Hour</option>
<option value="2">2 Hours</option>
<option value="4">4 Hours</option>
<option value="8">8 Hours</option>
<option value="24">24 Hours</option>

</select>

<button onclick="generateCode()">
GENERATE ACCESS CODE
</button>

<div id="generatedResult"></div>

</div>

<!-- PANIC -->
<div class="card">

<h2 style="color:red;">
🚨 LIVE PANIC SYSTEM
</h2>

<button
class="panicBtn"
onclick="triggerPanic()"
>
🚨 ACTIVATE PANIC
</button>

<div id="panicOut"></div>

<iframe
id="map"
style="display:none;">
</iframe>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_DOMAIN",

projectId:"YOUR_PROJECT_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* CREATE ACCOUNT */

window.createAccount = async function(){

const username =
document.getElementById("newUsername").value.trim();

const house =
document.getElementById("newHouse").value.trim();

const password =
document.getElementById("newPassword").value.trim();

if(
username.length < 6 ||
password.length < 8 ||
!house
){

document.getElementById("authMsg").innerHTML =

"<p class='error'>Use stronger details</p>";

return;

}

await addDoc(
collection(db,"residentAccounts"),
{
username,
house,
password,
created:Date.now()
}
);

document.getElementById("authMsg").innerHTML =

"<p class='success'>Account Created ✔</p>";

};

/* LOGIN */

window.login = async function(){

const u =
document.getElementById("username").value.trim();

const p =
document.getElementById("password").value.trim();

const q = query(
collection(db,"residentAccounts"),
where("username","==",u),
where("password","==",p)
);

const snap = await getDocs(q);

if(snap.empty){

document.getElementById("authMsg").innerHTML =

"<p class='error'>Invalid Login</p>";

return;

}

document.getElementById("auth").style.display =
"none";

document.getElementById("app").style.display =
"block";

};

/* LOGOUT */

window.logout = function(){

location.reload();

};

/* GENERATE VISITOR CODE */

window.generateCode = async function(){

let resident =
document.getElementById("residentName").value;

let house =
document.getElementById("houseNumber").value;

let visitor =
document.getElementById("visitorName").value;

let hours =
document.getElementById("hours").value;

if(!resident || !house || !visitor){

alert("Fill all fields");

return;

}

let code = Math.floor(
100000 + Math.random()*900000
);

let expiry =
Date.now() + hours * 3600000;

await addDoc(
collection(db,"visitorCodes"),
{
resident,
houseNumber:house,
visitor,
code:String(code),
expiry,
created:Date.now()
}
);

document.getElementById("generatedResult").innerHTML =

`
<p class="success">
Visitor Access Created ✔
</p>

<div class="code-box">
${code}
</div>
`;

};

/* LIVE PANIC */

let panicSending = false;

window.triggerPanic = async function(){

if(panicSending) return;

panicSending = true;

document.getElementById("panicOut").innerHTML =

"<p class='error'>🚨 SENDING LIVE PANIC...</p>";

if(!navigator.geolocation){

alert("GPS NOT SUPPORTED");

panicSending = false;

return;

}

navigator.geolocation.getCurrentPosition(

async(position)=>{

try{

const lat =
position.coords.latitude;

const lng =
position.coords.longitude;

const accuracy =
position.coords.accuracy;

/* SHOW MAP */

document.getElementById("map").style.display =
"block";

document.getElementById("map").src =

"https://maps.google.com/maps?q="
+
lat
+
","
+
lng
+
"&z=18&output=embed";

/* SEND PANIC */

await addDoc(
collection(db,"panicAlerts"),
{
latitude:lat,
longitude:lng,
accuracy,
status:"ACTIVE",
time:Date.now()
}
);

document.getElementById("panicOut").innerHTML =

`
<p class='error'>
🚨 LIVE PANIC SENT
</p>
`;

}catch(e){

document.getElementById("panicOut").innerHTML =

"<p class='error'>"+e.message+"</p>";

}

panicSending = false;

},

()=>{

alert("ALLOW LOCATION ACCESS");

panicSending = false;

},

{
enableHighAccuracy:true,
timeout:15000,
maximumAge:0
}

);

};

</script>

</body>
</html>
