<!DOCTYPE html>
<html>
<head>
  <title>AI Car Disc Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
      padding: 15px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
    }

    .card {
      background: #111;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .label { color: #00ffd5; font-weight: bold; }
    .value { margin-bottom: 8px; }

    #status { color: yellow; }
  </style>
</head>

<body>

<h2>🚗 AI Car Disc Scanner</h2>

<input type="file" accept="image/*" capture="environment" id="camera">
<br>
<button onclick="scanDisc()">Scan Disc</button>

<div id="status"></div>

<div class="card" id="result" style="display:none;">
  <div><span class="label">Registration:</span> <div id="reg"></div></div>
  <div><span class="label">Make:</span> <div id="make"></div></div>
  <div><span class="label">Model:</span> <div id="model"></div></div>
  <div><span class="label">VIN:</span> <div id="vin"></div></div>
  <div><span class="label">Expiry:</span> <div id="expiry"></div></div>
  <div><span class="label">Disc No:</span> <div id="disc"></div></div>
</div>

<script>
/* ================= FIREBASE ================= */
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
});

const db = firebase.firestore();

/* ================= OPENAI KEY ================= */
const OPENAI_API_KEY = "YOUR_OPENAI_API_KEY";

/* ================= MAIN FUNCTION ================= */
async function scanDisc() {
  const file = document.getElementById("camera").files[0];

  if (!file) {
    alert("Take a picture first");
    return;
  }

  document.getElementById("status").innerText = "Analyzing image...";

  const base64 = await toBase64(file);

  try {
    const res = await fetch("https://api.openai.com/v1/responses", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + OPENAI_API_KEY
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        input: [{
          role: "user",
          content: [
            {
              type: "input_text",
              text: `
Extract vehicle disc data from this image.

Return ONLY valid JSON:
{
  "registration_number": "",
  "vehicle_make": "",
  "vehicle_model": "",
  "vin_number": "",
  "expiry_date": "",
  "disc_number": ""
}

Rules:
- No guessing
- If missing return null
- JSON only
              `
            },
            {
              type: "input_image",
              image_url: base64
            }
          ]
        }]
      })
    });

    const data = await res.json();

    console.log("RAW RESPONSE:", data);

    let text =
      data.output?.[0]?.content?.find(c => c.type === "output_text")?.text;

    if (!text) {
      document.getElementById("status").innerText =
        "❌ AI returned no text (check console)";
      return;
    }

    let parsed;

    try {
      parsed = JSON.parse(text);
    } catch (e) {
      document.getElementById("status").innerText =
        "❌ JSON parse failed (AI returned invalid format)";
      console.log(text);
      return;
    }

    /* ================= SHOW ON SCREEN ================= */
    document.getElementById("status").innerText = "✅ Scan Complete";
    document.getElementById("result").style.display = "block";

    document.getElementById("reg").innerText = parsed.registration_number || "Not found";
    document.getElementById("make").innerText = parsed.vehicle_make || "Not found";
    document.getElementById("model").innerText = parsed.vehicle_model || "Not found";
    document.getElementById("vin").innerText = parsed.vin_number || "Not found";
    document.getElementById("expiry").innerText = parsed.expiry_date || "Not found";
    document.getElementById("disc").innerText = parsed.disc_number || "Not found";

    /* ================= FIREBASE SAVE ================= */
    await db.collection("scans").add({
      ...parsed,
      timestamp: new Date().toISOString()
    });

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText =
      "❌ Error: check console (F12)";
  }
}

/* ================= BASE64 ================= */
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}
</script>

</body>
</html>
